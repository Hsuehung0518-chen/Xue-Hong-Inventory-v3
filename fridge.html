<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏的智慧冰箱 - 16:9 Immersive v5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 深色玻璃風格 (Dark Glass UI) 大師優化版 */
        body { background: #0b1120; color: #f1f5f9; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* 強制 16:9 的容器 */
        .master-canvas {
            aspect-ratio: 16 / 9;
            max-width: 100vw;
            max-height: 100vh;
            margin: 0 auto;
            position: relative;
            background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        
        /* 冰箱呼吸燈效果  */
        .expiry-expired { border-color: rgba(239, 68, 68, 0.7); box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .expiry-warning { border-color: rgba(234, 179, 8, 0.7); box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .expiry-fresh { border-color: rgba(34, 197, 94, 0.7); box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }

        /* 卡片網格大師佈局 (Single Function) */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1.5rem;
            flex-grow: 1;
            overflow-y: auto; /* 內容過多時可捲動，但維持畫布比例 */
            padding-bottom: 1rem;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="master-canvas shadow-2xl rounded-3xl">
        
        <header class="flex justify-between items-center mb-8 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-white flex items-center gap-2">
                    <span class="text-blue-500">❄️</span> 學宏的智慧冰箱
                </h1>
                <p class="text-xs text-slate-500 mt-1">Status: <span id="status-live" class="text-green-400">LIVE: 0</span> | 專注模式: FRIDGE_SHEET</p>
            </div>
            
            <a href="portal.html" class="glass-card px-4 py-2 rounded-full text-xs text-slate-400 hover:text-white transition hover:bg-slate-700">
                ← 倉庫導航
            </a>
        </header>

        <div id="data-container" class="card-grid">
            </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec"; //
        const currentCat = "FRIDGE"; // 強制固定為單一功能頁面

        async function loadData() {
            const container = document.getElementById('data-container');
            container.innerHTML = '<p class="text-center col-span-full text-slate-500">量子同步中...</p>';
            
            try {
                // 向後端請求特定分類的 CSV [cite: 52-55, 91]
                const resp = await fetch(`${API_URL}?path=csv&cat=${currentCat}`);
                const csv = await resp.text();
                const lines = csv.trim().split('\n').slice(1); // 跳過標題
                
                document.getElementById('status-live').innerText = `LIVE: ${lines.length}`;
                container.innerHTML = "";

                if (lines.length === 0 || (lines.length === 1 && lines[0] === "")) {
                    container.innerHTML = '<p class="text-center col-span-full text-slate-600">冰箱空空如也。</p>';
                    return;
                }

                lines.forEach(line => {
                    const [name, spec, url, qty, date] = line.split(',');
                    const card = createCard(name, spec, url, qty, date);
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-400 text-center col-span-full">錯誤: ${err}</p>`;
            }
        }

        function createCard(name, spec, url, qty, date) {
            const div = document.createElement('div');
            
            // 冰箱專用：大師級過期提醒邏輯 
            let expiryClass = "expiry-fresh";
            let badgeStatus = "新鮮";
            if (spec && spec.match(/^\d{4}-\d{2}-\d{2}$/)) {
                const expiryDate = new Date(spec); 
                const today = new Date();
                const diffDays = (expiryDate - today) / (1000 * 60 * 60 * 24);
                
                if (diffDays < 0) { expiryClass = "expiry-expired"; badgeStatus = "已過期"; }
                else if (diffDays <= 3) { expiryClass = "expiry-warning"; badgeStatus = "快到期"; }
            }

            div.className = `glass-card p-4 rounded-xl relative overflow-hidden flex flex-col ${expiryClass}`;
            
            div.innerHTML = `
                <span class="absolute top-2 right-2 text-[10px] text-slate-400 font-mono">${badgeStatus}</span>
                <img src="${url}" class="w-full h-32 object-cover rounded-lg mb-3" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
                <h3 class="font-bold text-base mb-1 truncate">${name}</h3>
                <p class="text-[11px] text-slate-400 truncate">${spec || '無規格'}</p>
                <div class="flex justify-between mt-auto items-center pt-3 border-t border-slate-700/50">
                    <span class="text-blue-400 font-mono text-lg">x${qty}</span>
                    <span class="text-[9px] text-slate-600">${date ? date.split(' ')[0] : ''}</span>
                </div>
            `;
            return div;
        }

        // 初始載入
        loadData();
    </script>
</body>
</html>
