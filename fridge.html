<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏的智慧冰箱 - Immersive v5.1 Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 深色玻璃風格 (Dark Glass UI) 大師優化版 */
        body { background: #0b1120; color: #f1f5f9; font-family: 'Montserrat', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* 響應式畫布：手機端全螢幕，桌機端 16:9 */
        .master-canvas {
            background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%);
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        /* 桌機/平板端 (lg 斷點以上) 強制 16:9 */
        @media (min-width: 1024px) {
            .master-canvas {
                aspect-ratio: 16 / 9;
                max-width: 90vw;
                max-height: 90vh;
                margin: 2rem auto;
                padding: 2rem;
                border-radius: 1.5rem;
                box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }

        /* 手機端 (小於 lg) 全螢幕 */
        @media (max-width: 1023px) {
            .master-canvas {
                min-h-screen: 100vh;
                padding: 1rem;
            }
        }

        .glass-card { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        
        /* 冰箱呼吸燈效果 */
        .expiry-expired { border-color: rgba(239, 68, 68, 0.7); box-shadow: 0 0 15px rgba(239, 68, 68, 0.3); }
        .expiry-warning { border-color: rgba(234, 179, 8, 0.7); box-shadow: 0 0 15px rgba(234, 179, 8, 0.3); }
        .expiry-fresh { border-color: rgba(34, 197, 94, 0.7); box-shadow: 0 0 10px rgba(34, 197, 94, 0.2); }

        /* 卡片網格大師佈局 (Single Function) */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            flex-grow: 1;
            overflow-y: auto; /* 內容過多時可捲動 */
            padding-bottom: 1rem;
        }
        /* 美化捲動軸 */
        .card-grid::-webkit-scrollbar { width: 6px; }
        .card-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    </style>
</head>
<body class="flex lg:items-center lg:justify-center min-h-screen">

    <div class="master-canvas">
        
        <header class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-2xl lg:text-3xl font-extrabold tracking-tight text-white flex items-center gap-2">
                    <span class="text-blue-500">❄️</span> 學宏的智慧冰箱
                </h1>
                <p class="text-[10px] text-slate-500 mt-1">Status: <span id="status-live" class="text-green-400">LIVE: 0</span> | v5.1 UX Fix</p>
            </div>
            
            <a href="index.html" class="glass-card px-4 py-2 rounded-full text-xs text-slate-400 hover:text-white transition hover:bg-slate-700">
                ← 傳送門
            </a>
        </header>

        <div id="data-container" class="card-grid">
            </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec";
        const currentCat = "FRIDGE";

        async function loadData() {
            const container = document.getElementById('data-container');
            container.innerHTML = '<p class="text-center col-span-full text-slate-500 text-sm">冰箱能量同步中...</p>';
            
            try {
                // 向後端請求特定分類的 CSV
                const resp = await fetch(`${API_URL}?path=csv&cat=${currentCat}`);
                const csv = await resp.text();
                const lines = csv.trim().split('\n').slice(1); // 跳過標題
                
                document.getElementById('status-live').innerText = `LIVE: ${lines.length}`;
                container.innerHTML = "";

                if (lines.length === 0 || (lines.length === 1 && lines[0] === "")) {
                    container.innerHTML = '<p class="text-center col-span-full text-slate-600 text-sm py-10">冰箱空空如也。</p>';
                    return;
                }

                lines.forEach(line => {
                    const [name, spec, url, qty, date] = line.split(',');
                    const card = createCard(name, spec, url, qty, date);
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-400 text-center col-span-full text-sm">網路連線異常</p>`;
            }
        }

        function createCard(name, spec, url, qty, date) {
            const div = document.createElement('div');
            
            // 冰箱專用：大師級過期提醒邏輯
            let expiryClass = "expiry-fresh";
            let badgeStatus = "新鮮";
            if (spec && spec.match(/^\d{4}-\d{2}-\d{2}$/)) {
                const expiryDate = new Date(spec); 
                const today = new Date();
                const diffDays = (expiryDate - today) / (1000 * 60 * 60 * 24);
                
                if (diffDays < 0) { expiryClass = "expiry-expired"; badgeStatus = "已過期"; }
                else if (diffDays <= 3) { expiryClass = "expiry-warning"; badgeStatus = "快到期"; }
            }

            div.className = `glass-card p-4 rounded-xl relative overflow-hidden flex flex-col ${expiryClass}`;
            
            div.innerHTML = `
                <span class="absolute top-1 right-2 text-[9px] text-slate-500 font-mono">${badgeStatus}</span>
                <img src="${url}" class="w-full h-28 lg:h-32 object-cover rounded-lg mb-3" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
                <h3 class="font-bold text-sm mb-1 truncate">${name}</h3>
                <p class="text-[10px] text-slate-400 truncate">${spec || '無規格'}</p>
                <div class="flex justify-between mt-auto items-center pt-2 border-t border-slate-700/50">
                    <span class="text-blue-400 font-mono text-base">x${qty}</span>
                    <span class="text-[8px] text-slate-600">${date ? date.split(' ')[0] : ''}</span>
                </div>
            `;
            return div;
        }

        // 初始載入
        loadData();
    </script>
</body>
</html>
