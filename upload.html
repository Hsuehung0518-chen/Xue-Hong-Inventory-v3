<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <style>
        /* 新增：字帖卡片樣式 */
        .study-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(59, 130, 246, 0.5);
            animation: cardPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes cardPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="paifang-canvas w-full">
        <button onclick="startUpload()" id="uploadBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 tracking-[0.5em]">
            確認入庫 · 博毅恆行
        </button>

        <div id="egg-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80">
            <div class="study-card w-full max-w-sm p-8 rounded-[2.5rem] text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-600 to-indigo-600"></div>
                <p class="text-[10px] text-blue-500 tracking-[0.3em] mb-4 uppercase">Bo-Yi Study Card</p>
                
                <h2 id="egg-en" class="text-4xl font-black text-white mb-2 italic">Item Name</h2>
                <p id="egg-zh" class="text-sm text-slate-400 mb-6">中文名稱</p>
                
                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 mb-8">
                    <p id="egg-sentence" class="text-xs text-slate-300 leading-loose">The example sentence will appear here.</p>
                </div>

                <button onclick="closeEgg()" class="w-full py-3 bg-slate-800 hover:bg-slate-700 text-white rounded-xl text-xs transition">持續博學篤行</button>
            </div>
        </div>
    </div>

    <script>
        // ... Firebase 與 API 設定維持不變 ...

        // 簡易辭典模擬 (未來可接入翻譯 API)
        const studyDict = {
            "牛奶": { en: "Milk", sentence: "I drink a glass of fresh milk every morning to start my day." },
            "雞蛋": { en: "Eggs", sentence: "Remember to check the expiry date on the egg carton." },
            "書": { en: "Book", sentence: "A room without books is like a body without a soul." },
            "西裝": { en: "Suit", sentence: "He wore a sharp suit for the important business meeting." },
            "咖啡": { en: "Coffee", sentence: "Nothing beats the aroma of freshly brewed coffee." }
        };

        function showEgg(itemName) {
            const modal = document.getElementById('egg-modal');
            const enTitle = document.getElementById('egg-en');
            const zhTitle = document.getElementById('egg-zh');
            const sentence = document.getElementById('egg-sentence');

            // 尋找對應單字，若無則顯示通用學習卡
            const data = studyDict[itemName] || { 
                en: "New Entry", 
                sentence: "Continuous learning is the key to mastering your personal world." 
            };

            enTitle.innerText = data.en;
            zhTitle.innerText = `「 ${itemName} 」`;
            sentence.innerText = data.sentence;
            modal.classList.remove('hidden');
        }

        function closeEgg() {
            location.reload(); // 關閉後重整頁面，準備下一次入庫
        }

        async function startUpload() {
            // ... 前段 Firebase 上傳邏輯維持不變 ...
            
            // 在 fetch 成功的回傳處理中修改：
            const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await response.json();
            
            if (result.status === "success") {
                btn.disabled = false;
                status.innerText = ">> 入庫成功，開啟學習時刻...";
                showEgg(name); // 觸發學習彩蛋，取代原本的 alert
            } else {
                throw new Error(result.message);
            }
        }
    </script>
</body>
</html>
