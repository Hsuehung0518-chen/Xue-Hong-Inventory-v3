<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏 @ 博毅坊 | 疾速工位 v5.3.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; }
        .paifang-canvas { background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
        .glass-station { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2.5rem; }
        .input-dark { background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .input-dark:focus { border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); outline: none; }
        .study-card { background: rgba(15, 23, 42, 0.98); backdrop-filter: blur(40px); border: 1px solid rgba(59, 130, 246, 0.5); animation: cardPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes cardPop { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="paifang-canvas w-full min-h-screen flex flex-col items-center justify-center p-4">
        <header class="w-full max-w-2xl flex justify-between items-center mb-6">
            <h1 class="text-2xl lg:text-3xl font-black tracking-widest text-white">博毅坊 · 疾速工位</h1>
            <a href="index.html" class="text-[10px] bg-slate-800 px-6 py-2 rounded-full border border-slate-700 hover:bg-blue-900 transition">← 傳送門</a>
        </header>

        <div class="glass-station w-full max-w-2xl p-6 lg:p-10 shadow-2xl space-y-6">
            <div class="relative">
                <label class="block text-[10px] uppercase tracking-[0.4em] text-blue-400 mb-3 text-center">影像採集 / Image Selection</label>
                <div id="drop-zone" class="relative flex flex-col items-center justify-center w-full h-56 border-2 border-slate-700 border-dashed rounded-3xl bg-slate-900/50 overflow-hidden">
                    <div id="upload-hint" class="flex flex-col items-center justify-center text-slate-500" onclick="document.getElementById('fileInput').click()">
                        <span class="text-4xl mb-3">📸</span>
                        <p class="text-xs">點擊拍照或選擇影像</p>
                    </div>
                    <div id="preview-container" class="hidden w-full h-full relative">
                        <img id="imgPreview" class="w-full h-full object-contain bg-black/40">
                        <button onclick="resetImage()" class="absolute top-4 right-4 w-10 h-10 bg-red-600/80 text-white rounded-full flex items-center justify-center shadow-lg hover:bg-red-500 transition">✕</button>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="processImage(this)">
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] text-blue-400 mb-2 uppercase tracking-widest">Category / 分類</label>
                        <select id="category" onchange="updateUIByCat()" class="input-dark w-full p-4 rounded-2xl text-sm text-white">
                            <option value="COLLECTION">💎 私人收藏</option>
                            <option value="FRIDGE">❄️ 智慧冰箱</option>
                            <option value="BOOKS">📚 私人書藏</option>
                            <option value="WARDROBE">👔 精品衣櫥</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-[10px] text-blue-400 mb-2 uppercase tracking-widest">Name / 物品名稱</label>
                        <input type="text" id="itemName" placeholder="請輸入名稱" class="input-dark w-full p-4 rounded-2xl text-sm text-white">
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
                    <div class="lg:col-span-1">
                        <label id="specLabel" class="block text-[10px] text-blue-400 mb-2 uppercase tracking-widest">Spec / 規格效期</label>
                        <input type="text" id="itemSpec" class="input-dark w-full p-4 rounded-2xl text-sm text-white">
                    </div>
                    <div class="lg:col-span-1">
                        <label class="block text-[10px] text-blue-400 mb-2 uppercase tracking-widest">Location / 儲位</label>
                        <input type="text" id="itemLocation" placeholder="擺放位置" class="input-dark w-full p-4 rounded-2xl text-sm text-white">
                    </div>
                    <div class="lg:col-span-1">
                        <label class="block text-[10px] text-blue-400 mb-2 uppercase tracking-widest">Qty / 數量</label>
                        <input type="number" id="itemQty" value="1" min="1" class="input-dark w-full p-4 rounded-2xl text-sm text-white">
                    </div>
                </div>
            </div>

            <button onclick="startUpload()" id="uploadBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl transition-all active:scale-95 tracking-[0.8em] text-sm">
                確認入庫 · 博毅恆行
            </button>
            <p id="status" class="text-center text-[10px] text-blue-500 uppercase tracking-widest min-h-[1.5em]"></p>
        </div>
    </div>

    <div id="egg-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95">
        <div class="study-card w-full max-w-sm p-8 rounded-[3rem] text-center relative">
            <h2 class="text-3xl font-black text-white mb-4">歸檔完成</h2>
            <p id="egg-sentence" class="text-sm text-slate-300 leading-loose mb-8"></p>
            <button onclick="location.reload()" class="w-full py-4 bg-blue-600 text-white rounded-xl text-xs tracking-widest transition">好的</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDoyXGYWJ3HJPxs25HxoyJI2-9qRr9OKFk",
            authDomain: "xuehong-inventory.firebaseapp.com",
            projectId: "xuehong-inventory",
            storageBucket: "xuehong-inventory.appspot.com",
            messagingSenderId: "599267061741",
            appId: "1:599267061741:web:4eb73e73e66830a54881e4"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec";
        
        let compressedBlob = null;

        function updateUIByCat() {
            const cat = document.getElementById('category').value;
            const input = document.getElementById('itemSpec');
            input.type = (cat === 'FRIDGE') ? "date" : "text";
        }

        function resetImage() {
            document.getElementById('fileInput').value = "";
            document.getElementById('preview-container').classList.add('hidden');
            document.getElementById('upload-hint').classList.remove('hidden');
            compressedBlob = null;
        }

        // 智慧影像壓縮核心邏輯
        async function processImage(input) {
            const file = input.files[0];
            if (!file) return;

            const hint = document.getElementById('upload-hint');
            const container = document.getElementById('preview-container');
            const img = document.getElementById('imgPreview');
            const status = document.getElementById('status');

            status.innerText = "⏳ 影像最佳化中...";

            const reader = new FileReader();
            reader.onload = async (e) => {
                const tempImg = new Image();
                tempImg.src = e.target.result;
                tempImg.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = tempImg.width;
                    let height = tempImg.height;

                    // 限制最大寬度為 1280px，這能顯著降低檔案大小
                    const MAX_WIDTH = 1280;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(tempImg, 0, 0, width, height);

                    // 以 0.7 品質壓縮為 JPEG
                    canvas.toBlob((blob) => {
                        compressedBlob = blob;
                        img.src = URL.createObjectURL(blob);
                        hint.classList.add('hidden');
                        container.classList.remove('hidden');
                        status.innerText = `✅ 優化完成 (${(blob.size / 1024).toFixed(0)} KB)`;
                    }, 'image/jpeg', 0.7);
                };
            };
            reader.readAsDataURL(file);
        }

        async function genToken() {
            const ts = Math.floor(Date.now() / 1000);
            const _v = () => ["XUEHONG", "SUPER", "SECRET", "KEY", "2026"].join("_");
            const enc = new TextEncoder();
            const key = await crypto.subtle.importKey("raw", enc.encode(_v()), {name: "HMAC", hash: "SHA-256"}, false, ["sign"]);
            const sigBuf = await crypto.subtle.sign("HMAC", key, enc.encode(String(ts)));
            return { ts, sig: btoa(String.fromCharCode(...new Uint8Array(sigBuf))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "") };
        }

        async function startUpload() {
            if (!compressedBlob) return alert("📸 請先選擇影像");
            const name = document.getElementById('itemName').value;
            if (!name) return alert("✍️ 請輸入物品名稱");

            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');
            btn.disabled = true;

            try {
                status.innerText = "🚀 疾速上傳中 (Firebase)...";
                
                // 設定 90 秒上傳超時預警
                const uploadTask = storage.ref(`inventory/${Date.now()}.jpg`).put(compressedBlob);
                
                const uploadTimeout = setTimeout(() => {
                    alert("🛑 上傳超時！請檢查網路環境或重試。");
                    location.reload();
                }, 90000);

                const snapshot = await uploadTask;
                clearTimeout(uploadTimeout);
                const firebaseUrl = await snapshot.ref.getDownloadURL();

                status.innerText = "✍️ 資料寫入中 (Google Sheet)...";
                const { ts, sig } = await genToken();
                const payload = {
                    ts, sig, name, 
                    spec: `${document.getElementById('itemSpec').value || '無'} | 儲位：${document.getElementById('itemLocation').value || '未定'}`, 
                    qty: parseInt(document.getElementById('itemQty').value) || 1, 
                    firebaseUrl, category: document.getElementById('category').value, mode: "add"
                };

                const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await response.json();

                if (result.status === "success") {
                    status.innerText = "🎯 圓滿歸檔";
                    document.getElementById('egg-modal').classList.remove('hidden');
                    document.getElementById('egg-sentence').innerText = `物品「${name}」已妥善存檔。`;
                } else { throw new Error(result.message); }
            } catch (err) {
                alert("🛑 錯誤: " + err.message);
                btn.disabled = false;
                status.innerText = "系統重置中";
            }
        }
    </script>
</body>
</html>
