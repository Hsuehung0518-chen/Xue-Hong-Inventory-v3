<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xue-Hong Inventory Uploader v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        body { background: #0f172a; color: #f8fafc; }
        .glass-input { background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255,255,255,0.1); color: white; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-bold text-blue-400 mb-6 text-center">庫存入庫中心 v5</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm text-slate-400 mb-1">物品照片 (直接上傳 Firebase)</label>
                <input type="file" id="fileInput" accept="image/*" capture="camera" class="w-full glass-input p-2 rounded-lg text-sm">
            </div>

            <div>
                <label class="block text-sm text-slate-400 mb-1">歸屬類別</label>
                <select id="category" class="w-full glass-input p-3 rounded-lg outline-none focus:border-blue-500">
                    <option value="COLLECTION">我的收藏</option>
                    <option value="FRIDGE">冰箱食材 (請於規格填日期)</option>
                    <option value="BOOKS">我的書櫃</option>
                    <option value="WARDROBE">我的衣櫃</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm text-slate-400 mb-1">物品名稱</label>
                    <input type="text" id="itemName" placeholder="例如: 鮮奶" class="w-full glass-input p-3 rounded-lg">
                </div>
                <div>
                    <label class="block text-sm text-slate-400 mb-1">數量</label>
                    <input type="number" id="itemQty" value="1" class="w-full glass-input p-3 rounded-lg">
                </div>
            </div>

            <div>
                <label class="block text-sm text-slate-400 mb-1">規格/說明 (冰箱請填: YYYY-MM-DD)</label>
                <input type="text" id="itemSpec" placeholder="規格或效期" class="w-full glass-input p-3 rounded-lg">
            </div>

            <button onclick="startUpload()" id="uploadBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl shadow-lg transition">
                確認上傳入庫
            </button>
            <p id="status" class="text-center text-sm text-slate-500"></p>
        </div>
    </div>

    <script>
        // --- 設定區 ---
        const firebaseConfig = { /* 請填入你的 Firebase 配置  */ };
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec"; //
        const SECRET_KEY = "XUEHONG_SUPER_SECRET_KEY_2026"; // [cite: 104]

        // --- HMAC Token 生成器 ---
        async function genSignedToken() {
            const ts = Math.floor(Date.now() / 1000);
            const enc = new TextEncoder();
            const key = await crypto.subtle.importKey("raw", enc.encode(SECRET_KEY), {name: "HMAC", hash: "SHA-256"}, false, ["sign"]);
            const sigBuf = await crypto.subtle.sign("HMAC", key, enc.encode(String(ts)));
            const sig = btoa(String.fromCharCode(...new Uint8Array(sigBuf))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
            return { ts, sig };
        }

        // --- 上傳主邏輯 ---
        async function startUpload() {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('itemName').value;
            const category = document.getElementById('category').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('uploadBtn');

            if (!file || !name) return alert("請至少提供照片與名稱");

            try {
                btn.disabled = true;
                status.innerText = "Step 1: 上傳照片至 Firebase...";
                
                // 1. Firebase 上傳 [cite: 31]
                const fileRef = storage.ref(`inventory/${Date.now()}_${file.name}`);
                const snapshot = await fileRef.put(file);
                const firebaseUrl = await snapshot.ref.getDownloadURL(); // [cite: 32]

                status.innerText = "Step 2: 正在寫入 Google Sheet...";
                
                // 2. 生成安全 Token [cite: 102-109]
                const { ts, sig } = await genSignedToken();

                // 3. POST 到 Apps Script [cite: 33-41, 89]
                const payload = {
                    ts, sig,
                    name, 
                    spec: document.getElementById('itemSpec').value,
                    qty: document.getElementById('itemQty').value,
                    firebaseUrl,
                    category,
                    mode: "add"
                };

                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                const result = await response.json();
                if (result.status === "success") {
                    alert(`入庫成功！已分類至: ${category}`);
                    location.reload();
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                alert("上傳失敗: " + err.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
