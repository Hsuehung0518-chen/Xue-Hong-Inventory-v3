<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏 @ 博毅坊 | 入庫工位 v5.2.10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; }
        .paifang-canvas { 
            background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        @media (min-width: 1024px) {
            .paifang-canvas { aspect-ratio: 16 / 9; max-width: 90vw; max-height: 85vh; margin: 2rem auto; border-radius: 3rem; padding: 2rem; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
        }
        @media (max-width: 1023px) { .paifang-canvas { min-height: 100vh; padding: 1.5rem 1rem; } }

        .glass-station {
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem;
        }
        /* 確保彩蛋彈窗絕對隱藏且不干擾 */
        #egg-modal.hidden { display: none !important; }
        .study-card {
            background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(30px);
            border: 1px solid rgba(59, 130, 246, 0.5);
            animation: cardPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes cardPop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="paifang-canvas w-full">
        <header class="w-full max-w-2xl flex justify-between items-center mb-6 px-4">
            <h1 class="text-xl lg:text-3xl font-black tracking-widest text-white">博毅坊 · 入庫工位</h1>
            <a href="index.html" class="text-[10px] bg-slate-800 px-4 py-2 rounded-full hover:bg-blue-900 transition">← 返回傳送門</a>
        </header>

        <div class="glass-station w-full max-w-2xl p-6 lg:p-10 shadow-2xl space-y-6">
            <div class="relative group">
                <label class="block text-[10px] uppercase tracking-widest text-blue-400 mb-2">Item Image / 影像採集</label>
                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-700 border-dashed rounded-xl cursor-pointer bg-slate-900/50 hover:bg-slate-800 transition">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 text-slate-500">
                        <span class="text-3xl mb-2">📸</span>
                        <p class="text-xs">點擊開啟相機拍照</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" capture="camera" class="hidden" onchange="previewImage(this)">
                </label>
                <div id="preview-box" class="hidden mt-4 text-center">
                    <img id="imgPreview" src="#" class="mx-auto h-32 rounded-lg border border-blue-500/50 shadow-lg">
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] text-slate-500 mb-1">分類</label>
                    <select id="category" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm text-white">
                        <option value="COLLECTION">💎 私人收藏</option>
                        <option value="FRIDGE">❄️ 智慧冰箱</option>
                        <option value="BOOKS">📚 私人書藏</option>
                        <option value="WARDROBE">👔 精品衣櫥</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-500 mb-1">名稱</label>
                    <input type="text" id="itemName" placeholder="例如: 義美鮮奶" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm text-white">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <input type="text" id="itemSpec" placeholder="規格/效期 (YYYY-MM-DD)" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm text-white">
                <input type="number" id="itemQty" value="1" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm text-white">
            </div>

            <button onclick="startUpload()" id="uploadBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 tracking-[0.5em]">
                確認入庫 · 博毅恆行
            </button>
            <p id="status" class="text-center text-[10px] text-slate-600 uppercase tracking-tighter"></p>
        </div>

        <div id="egg-modal" class="hidden fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/90">
            <div class="study-card w-full max-w-sm p-8 rounded-[2.5rem] text-center">
                <p class="text-[10px] text-blue-500 tracking-[0.3em] mb-4 uppercase">Bo-Yi Study Card</p>
                <h2 id="egg-en" class="text-4xl font-black text-white mb-2 italic">Item</h2>
                <p id="egg-zh" class="text-sm text-slate-400 mb-6">中文名稱</p>
                <div class="bg-slate-900/50 p-4 rounded-xl border border-slate-800 mb-8">
                    <p id="egg-sentence" class="text-xs text-slate-300 leading-loose italic"></p>
                </div>
                <button onclick="location.reload()" class="w-full py-3 bg-slate-800 text-white rounded-xl text-xs">持續博學篤行</button>
            </div>
        </div>
    </div>

    <script>
        // --- 請務必檢查此處配置是否正確 ---
        const firebaseConfig = { /* 這裡填入你的 Firebase 配置 */ };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const storage = firebase.storage();
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec";
        const SECRET_KEY = "XUEHONG_SUPER_SECRET_KEY_2026";

        function previewImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { 
                    document.getElementById('imgPreview').src = e.target.result; 
                    document.getElementById('preview-box').classList.remove('hidden'); 
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        const studyDict = {
            "牛奶": { en: "Milk", sentence: "Fresh milk is essential for a healthy breakfast." },
            "雞蛋": { en: "Eggs", sentence: "Store eggs in the fridge to keep them fresh." }
            /* 可自行擴充... */
        };

        async function startUpload() {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('itemName').value;
            if (!file || !name) return alert("請拍張照並輸入名稱");

            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');
            
            try {
                btn.disabled = true;
                status.innerText = ">> 正在採集影像並同步至博毅坊...";
                
                // 1. Firebase 上傳
                const fileRef = storage.ref(`inventory/${Date.now()}_${file.name}`);
                const snapshot = await fileRef.put(file);
                const firebaseUrl = await snapshot.ref.getDownloadURL();

                // 2. 生成安全簽章
                const ts = Math.floor(Date.now() / 1000);
                const enc = new TextEncoder();
                const key = await crypto.subtle.importKey("raw", enc.encode(SECRET_KEY), {name: "HMAC", hash: "SHA-256"}, false, ["sign"]);
                const sigBuf = await crypto.subtle.sign("HMAC", key, enc.encode(String(ts)));
                const sig = btoa(String.fromCharCode(...new Uint8Array(sigBuf))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");

                // 3. POST 數據
                const payload = {
                    ts, sig, name, firebaseUrl,
                    category: document.getElementById('category').value,
                    spec: document.getElementById('itemSpec').value,
                    qty: document.getElementById('itemQty').value,
                    mode: "add"
                };

                const resp = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await resp.json();

                if (result.status === "success") {
                    // 顯示彩蛋
                    const data = studyDict[name] || { en: "New Growth", sentence: "Each entry is a step toward a better organized life." };
                    document.getElementById('egg-en').innerText = data.en;
                    document.getElementById('egg-zh').innerText = `「 ${name} 」`;
                    document.getElementById('egg-sentence').innerText = data.sentence;
                    document.getElementById('egg-modal').classList.remove('hidden');
                } else { throw new Error(result.message); }
            } catch (err) {
                alert("入庫失敗: " + err.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
