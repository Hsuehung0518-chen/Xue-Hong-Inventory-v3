\<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏 @ 博毅坊 | 入庫工位 v5.3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; }
        .paifang-canvas { background: radial-gradient(circle at top right, #1e1b4b 0%, #020617 100%); }
        .glass-station { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); border-radius: 2rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="paifang-canvas w-full min-h-screen flex flex-col items-center justify-center p-4">
        <header class="w-full max-w-2xl flex justify-between items-center mb-6">
            <h1 class="text-xl lg:text-3xl font-black tracking-widest text-white">博毅坊 · 入庫工位</h1>
            <a href="index.html" class="text-[10px] bg-slate-800 px-4 py-2 rounded-full hover:bg-blue-900 transition">← 傳送門</a>
        </header>

        <div class="glass-station w-full max-w-2xl p-6 lg:p-10 shadow-2xl space-y-6">
            <div class="relative group">
                <label class="block text-[10px] uppercase tracking-widest text-blue-400 mb-2">Item Image / 影像採集</label>
                <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-700 border-dashed rounded-xl cursor-pointer bg-slate-900/50 hover:bg-slate-800 transition">
                    <div class="flex flex-col items-center justify-center text-slate-500">
                        <span class="text-3xl mb-2">📸</span>
                        <p class="text-xs">點擊拍照或選擇照片</p>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" capture="camera" class="hidden" onchange="previewImage(this)">
                </label>
                <div id="preview-box" class="hidden mt-4 text-center">
                    <img id="imgPreview" src="#" class="mx-auto h-32 rounded-lg border border-blue-500/50 shadow-lg">
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <select id="category" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm text-white">
                    <option value="COLLECTION">💎 私人收藏</option>
                    <option value="FRIDGE">❄️ 智慧冰箱</option>
                    <option value="BOOKS">📚 私人書藏</option>
                    <option value="WARDROBE">👔 精品衣櫥</option>
                </select>
                <input type="text" id="itemName" placeholder="物品名稱" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-sm text-white">
            </div>

            <button onclick="startUpload()" id="uploadBtn" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 tracking-[0.5em]">
                確認入庫 · 博毅恆行
            </button>
            <p id="status" class="text-center text-[10px] text-slate-600 uppercase"></p>
        </div>
    </div>

    <script>
        // --- 資安加固配置區 ---
        const firebaseConfig = {
            apiKey: "AIzaSyBw... (填入你截圖中的完整 apiKey)",
            authDomain: "xuehong-inventory.firebaseapp.com",
            projectId: "xuehong-inventory",
            storageBucket: "xuehong-inventory.appspot.com",
            messagingSenderId: "367205244583",
            appId: "1:367205244583:web:78c5997970d475688a2d17"
        };
        firebase.initializeApp(firebaseConfig);
        const storage = firebase.storage();

        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec";
        
        // 🔐 密鑰混淆化 (Obfuscation): 透過分段合成，防止 GitHub 爬蟲直接抓取純文字金鑰
        const _k = ["XUEHONG", "SUPER", "SECRET", "KEY", "2026"];
        const _v = () => _k.join("_"); 

        function previewImage(input) {
            const box = document.getElementById('preview-box');
            const img = document.getElementById('imgPreview');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => { img.src = e.target.result; box.classList.remove('hidden'); }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function genToken() {
            const ts = Math.floor(Date.now() / 1000);
            const enc = new TextEncoder();
            const key = await crypto.subtle.importKey("raw", enc.encode(_v()), {name: "HMAC", hash: "SHA-256"}, false, ["sign"]);
            const sigBuf = await crypto.subtle.sign("HMAC", key, enc.encode(String(ts)));
            const sig = btoa(String.fromCharCode(...new Uint8Array(sigBuf))).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/, "");
            return { ts, sig };
        }

        async function startUpload() {
            const file = document.getElementById('fileInput').files[0];
            const name = document.getElementById('itemName').value;
            const btn = document.getElementById('uploadBtn');
            const status = document.getElementById('status');

            if (!file || !name) return alert("請拍張照並輸入名稱");

            try {
                btn.disabled = true;
                status.innerText = ">> 加密影像採集中...";
                const fileRef = storage.ref(`inventory/${Date.now()}_${file.name}`);
                const snapshot = await fileRef.put(file);
                const firebaseUrl = await snapshot.ref.getDownloadURL();

                status.innerText = ">> 安全握手驗證中...";
                const { ts, sig } = await genToken();

                const payload = {
                    ts, sig, name, 
                    spec: "", qty: 1, 
                    firebaseUrl, 
                    category: document.getElementById('category').value, 
                    mode: "add"
                };

                const response = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                const result = await response.json();
                if (result.status === "success") {
                    alert("【" + name + "】已成功歸檔至博毅坊！");
                    location.reload();
                } else { throw new Error(result.message); }
            } catch (err) {
                alert("入庫失敗: " + err.message);
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
