<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏的精品衣櫥 - Master v5.1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: sans-serif; margin: 0; overflow: hidden; }
        .master-canvas { aspect-ratio: 16 / 9; max-width: 100vw; max-height: 100vh; margin: 0 auto; position: relative; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 2rem; display: flex; flex-direction: column; }
        .glass-card { background: rgba(255, 255, 255, 0.04); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); transition: 0.3s; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; flex-grow: 1; overflow-y: auto; padding-bottom: 1rem; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="master-canvas shadow-2xl rounded-3xl">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <div>
                <h1 class="text-3xl font-extrabold text-white flex items-center gap-2"><span class="text-indigo-400">👔</span> 精品衣櫥</h1>
                <p class="text-xs text-slate-500 mt-1">Status: <span id="status-live" class="text-indigo-400">LIVE: 0</span> | 風格收納模式</p>
            </div>
            <a href="index.html" class="glass-card px-4 py-2 rounded-full text-xs text-slate-400 hover:text-white transition">← 傳送門</a>
        </header>
        <div id="data-container" class="card-grid"></div>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec";
        const currentCat = "WARDROBE";
        async function loadData() {
            const container = document.getElementById('data-container');
            container.innerHTML = '<p class="text-center col-span-full text-slate-500">衣飾盤點中...</p>';
            try {
                const resp = await fetch(`${API_URL}?path=csv&cat=${currentCat}`);
                const csv = await resp.text();
                const lines = csv.trim().split('\n').slice(1);
                document.getElementById('status-live').innerText = `LIVE: ${lines.length}`;
                container.innerHTML = "";
                lines.forEach(line => {
                    const [name, spec, url, qty, date] = line.split(',');
                    const div = document.createElement('div');
                    div.className = "glass-card p-4 rounded-xl flex flex-col";
                    div.innerHTML = `<img src="${url}" class="w-full h-32 object-cover rounded-lg mb-3" onerror="this.src='https://placehold.co/400x300?text=No+Photo'">
                        <h3 class="font-bold text-base mb-1 truncate">${name}</h3>
                        <p class="text-[11px] text-slate-400 truncate">${spec || '日常穿搭'}</p>
                        <div class="flex justify-between mt-auto items-center pt-3 border-t border-white/5">
                            <span class="text-indigo-400 font-mono text-lg">x${qty}</span>
                            <span class="text-[9px] text-slate-600">${date ? date.split(' ')[0] : ''}</span>
                        </div>`;
                    container.appendChild(div);
                });
            } catch (err) { container.innerHTML = `<p class="text-red-400 text-center col-span-full">載入失敗</p>`; }
        }
        loadData();
    </script>
</body>
</html>
