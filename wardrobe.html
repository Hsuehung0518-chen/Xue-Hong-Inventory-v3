<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; overflow-x: hidden; }
        
        /* 風格鏡鑑卡樣式 */
        .style-modal {
            background: rgba(10, 15, 25, 0.98);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(129, 140, 248, 0.3); /* 靛色邊框意象 */
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            animation: fashionPop 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
        }
        @keyframes fashionPop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .style-accent { color: #818cf8; font-weight: 900; font-family: sans-serif; }
    </style>
</head>
<body class="flex lg:items-center lg:justify-center min-h-screen">
    <div id="style-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90">
        <div class="style-modal w-full max-w-sm p-8 lg:p-10 rounded-[2.5rem] text-center relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-600 via-purple-600 to-indigo-600"></div>
            
            <p class="text-[10px] tracking-[0.4em] mb-6 text-indigo-400 uppercase">Bo-Yi Style Psychology</p>
            <h2 id="style-item-name" class="text-2xl font-black text-white mb-8 border-b border-slate-800 pb-4">衣物名稱</h2>
            
            <div class="bg-slate-900/50 p-6 rounded-2xl border border-slate-800 text-left space-y-4">
                <p class="text-[10px] style-accent"># 博毅風格哲學 / Philosophy</p>
                <p id="style-tip" class="text-xs lg:text-sm text-slate-300 leading-loose"></p>
            </div>

            <button onclick="closeStyleModal()" class="mt-10 w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white rounded-full text-[10px] tracking-[0.5em] transition uppercase font-bold shadow-lg">
                穿出自我 · 博毅篤行
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec";
        const currentCat = "WARDROBE";

        // 博毅風格心理學庫 [cite: 2025-10-01]
        const styleWisdom = [
            "真正的精品，不在於衣標上的 Logo，而在於您穿上它時展現的自信。不盲從潮流，只選擇適合自己膚色與體型的『戰袍』。",
            "色彩是有能量的。今日若是需要展現領導力，試著搭配深藍色系；若是需要創意交流，點綴一點黃色或綠色。穿對顏色，就贏了心理戰。",
            "場合穿搭 (TPO) 的核心是『尊重』。尊重場合、尊重他人，也尊重自己。合宜的穿搭，比昂貴的服飾更能贏得信任。",
            "『簡約』是極致的複雜。試著褪去不必要的裝飾，讓您的談吐與眼神成為最耀眼的名牌。名牌是您自己穿出來的。",
            "衣服是您的第二層皮膚，它反映了您當下的心情與生活哲學。選擇讓您感到舒適且有力量的材質，讓穿搭成為一種日常的修身。"
        ];

        function showStyleTip(name) {
            const modal = document.getElementById('style-modal');
            const itemName = document.getElementById('style-item-name');
            const styleTip = document.getElementById('style-tip');

            const randomTip = styleWisdom[Math.floor(Math.random() * styleWisdom.length)];

            itemName.innerText = name;
            styleTip.innerText = randomTip;

            modal.classList.remove('hidden');
        }

        function closeStyleModal() {
            document.getElementById('style-modal').classList.add('hidden');
        }

        // 修改 createCard 增加點擊功能
        function createCard(name, spec, url, qty, date) {
            const div = document.createElement('div');
            div.className = "glass-card p-4 rounded-xl flex flex-col cursor-pointer transition active:scale-95 hover:border-indigo-900/50";
            div.onclick = () => showStyleTip(name); // 綁定點擊鏡鑑

            div.innerHTML = `
                <img src="${url}" class="w-full h-32 lg:h-40 object-cover rounded-lg mb-3 shadow-lg" onerror="this.src='https://placehold.co/400x300?text=No+Photo'">
                <h3 class="font-bold text-sm mb-1 truncate text-white">${name}</h3>
                <p class="text-[10px] text-slate-500 truncate">${spec || '日常穿搭'}</p>
                <div class="flex justify-between mt-auto items-center pt-3 border-t border-white/5">
                    <span class="text-indigo-400 font-mono text-base">x${qty}</span>
                    <span class="text-[8px] text-slate-700">${date ? date.split(' ')[0] : ''}</span>
                </div>
            `;
            return div;
        }

        // ... 其餘載入邏輯維持不變 ...
    </script>
</body>
</html>
