<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏 @ 博毅坊 | 私人收藏 v5.4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; }
        .glass-panel { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 2rem; }
        .item-card { background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(59, 130, 246, 0.2); transition: 0.3s; }
        .item-card:hover { transform: translateY(-5px); border-color: #3b82f6; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.3); }
        .image-container { aspect-ratio: 1/1; overflow: hidden; border-radius: 1rem; }
    </style>
</head>
<body class="p-4 lg:p-10 min-h-screen">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-3xl font-black tracking-widest text-white">💎 私人收藏</h1>
                <p class="text-[10px] text-blue-400 uppercase tracking-[0.4em] mt-1">Collection Gallery</p>
            </div>
            <a href="index.html" class="bg-slate-800 px-6 py-2 rounded-full text-xs border border-slate-700 hover:bg-blue-900 transition">← 門戶</a>
        </header>

        <div id="loading" class="text-center py-20 text-blue-500 animate-pulse text-xs tracking-widest">⏳ 正在與博毅坊資料庫同步...</div>

        <div id="collection-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <script>
        // 1. Firebase 配置 (已校準)
        const firebaseConfig = {
            apiKey: "你的API_KEY",
            authDomain: "xuehong-inventory.firebaseapp.com",
            projectId: "xuehong-inventory",
            storageBucket: "xuehong-inventory.appspot.com",
            messagingSenderId: "你的SENDER_ID",
            appId: "你的APP_ID"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // 2. 數據獲取與渲染 (Token 最精化邏輯)
        async function fetchCollection() {
            const grid = document.getElementById('collection-grid');
            const loading = document.getElementById('loading');
            
            try {
                // 只查詢分類為 COLLECTION 的項目，並按時間排序
                const snapshot = await db.collection("inventory_logs")
                                   .where("category", "==", "COLLECTION")
                                   .orderBy("timestamp", "desc")
                                   .get();
                
                loading.classList.add('hidden');
                
                if (snapshot.empty) {
                    grid.innerHTML = `<div class="col-span-full text-center text-slate-600 text-xs py-20">目前尚無收藏紀錄</div>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const data = doc.data();
                    const card = `
                        <div class="item-card p-4 rounded-3xl flex flex-col space-y-3">
                            <div class="image-container">
                                <img src="${data.imageUrl || data.image}" class="w-full h-full object-cover" loading="lazy">
                            </div>
                            <div class="px-2">
                                <h3 class="font-bold text-sm text-white truncate">${data.name}</h3>
                                <p class="text-[9px] text-slate-500 mt-1">🏷️ ${data.spec || '標準規格'}</p>
                                <div class="flex justify-between items-center mt-3">
                                    <span class="text-[9px] bg-blue-900/40 text-blue-300 px-2 py-1 rounded-md">Qty: ${data.qty || 1}</span>
                                    <span class="text-[8px] text-slate-600">${new Date(data.timestamp?.toDate()).toLocaleDateString()}</span>
                                </div>
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } catch (err) {
                console.error(err);
                loading.innerText = "❌ 無法讀取資料庫，請檢查規則權限。";
            }
        }

        window.onload = fetchCollection;
    </script>
</body>
</html>
