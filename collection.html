<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏的私人收藏 - Master v5.1 RWD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0b1120; color: #f1f5f9; font-family: sans-serif; margin: 0; overflow-x: hidden; }
        .master-canvas { background: radial-gradient(circle at center, #1e293b 0%, #0b1120 100%); display: flex; flex-direction: column; transition: all 0.3s ease; }
        @media (min-width: 1024px) { .master-canvas { aspect-ratio: 16 / 9; max-width: 90vw; max-height: 90vh; margin: 2rem auto; padding: 2rem; border-radius: 1.5rem; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); } }
        @media (max-width: 1023px) { .master-canvas { min-height: 100vh; padding: 1rem; } }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); transition: 0.3s; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; flex-grow: 1; overflow-y: auto; padding-bottom: 1rem; }
        .card-grid::-webkit-scrollbar { width: 6px; }
        .card-grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    </style>
</head>
<body class="flex lg:items-center lg:justify-center min-h-screen">
    <div class="master-canvas">
        <header class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
            <div>
                <h1 class="text-2xl lg:text-3xl font-extrabold tracking-tight text-white flex items-center gap-2"><span class="text-blue-500">💎</span> 我的私人收藏</h1>
                <p class="text-[10px] text-slate-500 mt-1">Status: <span id="status-live" class="text-green-400">LIVE: 0</span> | 沉浸模式</p>
            </div>
            <a href="index.html" class="glass-card px-4 py-2 rounded-full text-xs text-slate-400 hover:text-white transition">← 傳送門</a>
        </header>
        <div id="data-container" class="card-grid"></div>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec";
        const currentCat = "COLLECTION";
        async function loadData() {
            const container = document.getElementById('data-container');
            container.innerHTML = '<p class="text-center col-span-full text-slate-500 text-sm">收藏品同步中...</p>';
            try {
                const resp = await fetch(`${API_URL}?path=csv&cat=${currentCat}`);
                const csv = await resp.text();
                const lines = csv.trim().split('\n').slice(1);
                document.getElementById('status-live').innerText = `LIVE: ${lines.length}`;
                container.innerHTML = "";
                lines.forEach(line => {
                    const [name, spec, url, qty, date] = line.split(',');
                    const div = document.createElement('div');
                    div.className = "glass-card p-4 rounded-xl flex flex-col";
                    div.innerHTML = `<img src="${url}" class="w-full h-28 lg:h-32 object-cover rounded-lg mb-3" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
                        <h3 class="font-bold text-sm mb-1 truncate">${name}</h3>
                        <p class="text-[10px] text-slate-400 truncate">${spec || '珍藏品'}</p>
                        <div class="flex justify-between mt-auto items-center pt-2 border-t border-white/10">
                            <span class="text-blue-400 font-mono text-base">x${qty}</span>
                            <span class="text-[8px] text-slate-600">${date ? date.split(' ')[0] : ''}</span>
                        </div>`;
                    container.appendChild(div);
                });
            } catch (err) { container.innerHTML = `<p class="text-red-400 text-center col-span-full text-sm">連線失敗</p>`; }
        }
        loadData();
    </script>
</body>
</html>
