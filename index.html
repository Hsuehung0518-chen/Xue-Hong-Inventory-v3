<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零件庫存智慧查詢系統 v4.1 | 學宏 AI 研發智坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #020617; color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        
        .glass-header { 
            background: rgba(2, 6, 23, 0.85); 
            backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }

        .item-card { 
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        
        .item-card:hover { border-color: rgba(59, 130, 246, 0.4); }

        .ai-shimmer { 
            background: linear-gradient(90deg, #1d4ed8, #7c3aed, #1d4ed8); 
            background-size: 200% auto; 
            animation: shimmer 3s linear infinite; 
        }

        @keyframes shimmer { to { background-position: 200% center; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 0.6s ease-out forwards; }
        
        /* 圖片容器與強效載入邏輯 */
        .img-container {
            width: 100%;
            height: 280px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 1.2s ease-in-out;
            z-index: 1;
        }
        .img-loaded img { opacity: 1; }
        
        .img-placeholder {
            position: absolute;
            font-size: 3rem;
            opacity: 0.15;
            z-index: 0;
        }
        
        .quantity-badge {
            text-shadow: 0 0 25px rgba(59, 130, 246, 0.6);
        }
    </style>
</head>
<body class="min-h-screen flex justify-center">

    <div class="w-full max-w-md min-h-screen flex flex-col relative overflow-hidden bg-slate-950 border-x border-white/5">
        
        <header class="glass-header p-6 sticky top-0 z-40 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-white font-black text-xl tracking-tighter flex items-center gap-2">
                        <span class="text-2xl text-blue-500">🛡️</span> 庫存智慧中心
                    </h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]">Xue-Hong v3.1.2 Optical+</span>
                        <div id="statusDot" class="w-2 h-2 rounded-full bg-slate-700 transition-colors"></div>
                    </div>
                </div>
                <div id="syncBadge" class="text-[9px] font-black px-3 py-1 rounded-full border border-slate-800 text-slate-500 uppercase tracking-widest">Standby</div>
            </div>

            <div class="relative group">
                <input type="text" id="filterInput" oninput="runFilter()" 
                       placeholder="搜尋料號或規格..." 
                       class="w-full p-4 pl-12 rounded-2xl bg-slate-900/90 text-white border border-slate-800 focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 outline-none transition-all placeholder:text-slate-700 shadow-inner">
                <span class="absolute left-4 top-4 text-xl opacity-20 group-focus-within:opacity-100 transition-opacity">🔍</span>
            </div>

            <button onclick="analyzeFullInventory()" class="w-full mt-4 py-4 ai-shimmer text-white rounded-2xl text-[11px] font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all uppercase tracking-widest">✨ 啟動 AI 全局策略分析</button>
        </header>

        <main id="itemList" class="flex-1 p-5 space-y-8 overflow-y-auto no-scrollbar pb-32">
            <div id="loadingInfo" class="flex flex-col items-center justify-center py-48 text-slate-700">
                <div class="w-10 h-10 border-2 border-slate-800 border-t-blue-500 rounded-full animate-spin mb-6"></div>
                <p class="font-bold text-xs tracking-widest animate-pulse uppercase">Synchronizing Visual Assets...</p>
            </div>
        </main>

        <div id="aiModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-2xl hidden">
            <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[85vh] animate-fade-in border border-white/5">
                <div class="p-6 bg-slate-800/50 text-white flex justify-between items-center border-b border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full ai-shimmer flex items-center justify-center text-xs">✨</div>
                        <h3 class="font-black text-xs tracking-widest uppercase">AI Strategic Insight</h3>
                    </div>
                    <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-800 transition-colors">✕</button>
                </div>
                <div id="aiContent" class="p-8 overflow-y-auto text-sm text-slate-300 leading-relaxed font-medium"></div>
                <div class="p-6 bg-slate-900">
                    <button onclick="closeModal()" class="w-full py-4 bg-white text-slate-900 rounded-2xl text-xs font-black shadow-xl active:scale-95 transition-all uppercase tracking-widest">確認並關閉</button>
                </div>
            </div>
        </div>

        <footer class="p-6 bg-slate-950/80 backdrop-blur-md border-t border-white/5 flex flex-col items-center gap-2 fixed bottom-0 w-full max-w-md">
            <p class="text-[9px] text-slate-700 font-black uppercase tracking-[0.4em]">Seven-Star Strategic System</p>
        </footer>
    </div>

    <script>
        /**
         * 💎 學宏 AI 研發智坊：核心底層驅動 (v3.1.2 視覺終極修復版)
         */
        // ⚠️ 核心修復：請在此填入您的正式 Gemini API Key
        const apiKey = "請在此填寫您的_GEMINI_API_KEY"; 
        
        const SHEET_ID = "2PACX-1vS8nkx1MrkeZ_xhnvzCG9_v03AnyR6rK58DhNRxULaSmVEgUFByTZ2TLRT62gOQ8q_8RSy2e05ag8qw";
        const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;

        let db = [];

        // 🛡️ 終極圖片解析器：支援直連格式轉換 (修復語法錯誤)
        function fixImageUrl(url) {
            if (!url) return "";
            url = url.trim();
            
            if (url.includes("drive.google.com")) {
                let id = "";
                const regex = /[-\w]{25,}/; 
                const match = url.match(regex);
                if (match) {
                    id = match[0];
                    // 修復：補上 $ 符號，並使用相容性更高的 Drive 讀取點
                    return `https://drive.google.com/uc?export=view&id=${id}`;
                }
            }
            return url;
        }

        async function loadData() {
            const listEl = document.getElementById('itemList');
            const badge = document.getElementById('syncBadge');
            const dot = document.getElementById('statusDot');

            try {
                badge.innerText = "LINKING";
                badge.className = "text-[9px] font-black px-3 py-1 rounded-full border border-blue-900 text-blue-500 animate-pulse";
                dot.className = "w-2 h-2 rounded-full bg-blue-500 animate-ping";

                const response = await fetch(`${CSV_URL}&t=${Date.now()}`);
                if (!response.ok) throw new Error(`HTTP_${response.status}`);
                
                const csvData = await response.text();
                const rows = csvData.split(/\r?\n/).filter(r => r.trim() !== "").map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                if (rows.length < 2) throw new Error("Sheet_Empty");

                // 修復：完整捕獲第 5 個欄位 (UPDATED時間)
                db = rows.slice(1).map(row => ({
                    name: (row[0] || "").replace(/"/g, "").trim(),
                    spec: (row[1] || "").replace(/"/g, "").trim(),
                    photo: fixImageUrl((row[2] || "").replace(/"/g, "").trim()),
                    qty: (row[3] || "0").replace(/"/g, "").trim(),
                    updatedAt: (row[4] || "未提供更新時間").replace(/"/g, "").trim()
                })).filter(i => i.name !== "");

                badge.innerText = `LIVE: ${db.length}`;
                badge.className = "text-[9px] font-black px-3 py-1 rounded-full border border-green-900 text-green-500 font-bold";
                dot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_12px_rgba(34,197,94,0.4)]";
                
                runFilter();
            } catch (e) {
                dot.className = "w-2 h-2 rounded-full bg-red-600";
                listEl.innerHTML = `<div class="p-12 text-center bg-red-950/20 rounded-[2.5rem] border border-red-900/30 animate-fade-in mx-4"><p class="text-red-500 font-black mb-4 tracking-tighter text-lg font-black uppercase tracking-widest">Stream Interrupted</p><button onclick="location.reload()" class="w-full py-4 bg-red-600 text-white rounded-2xl text-[10px] font-black uppercase tracking-widest">Restart System</button></div>`;
            }
        }

        function runFilter() {
            const term = document.getElementById('filterInput').value.toLowerCase();
            const listEl = document.getElementById('itemList');
            const results = db.filter(i => i.name.toLowerCase().includes(term) || i.spec.toLowerCase().includes(term));
            
            if (results.length === 0) {
                listEl.innerHTML = `<div class="flex flex-col items-center py-40 text-slate-800 animate-fade-in"><span class="text-8xl mb-6 opacity-10">🔎</span><p class="text-xs font-black italic tracking-widest uppercase">No assets found</p></div>`;
                return;
            }

            // 修復：UI 增加 updatedAt 欄位顯示，且為 i.name 加上跳脫處理
            listEl.innerHTML = results.map((i, idx) => `
                <div class="rounded-[2.5rem] overflow-hidden item-card animate-fade-in shadow-2xl" style="animation-delay: ${idx * 0.05}s">
                    <div class="img-container">
                        <span class="img-placeholder">🛠️</span>
                        ${i.photo ? `<img src="${i.photo}" loading="lazy" onload="this.parentElement.classList.add('img-loaded')" onerror="this.style.display='none'">` : ''}
                        <div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-slate-950 via-slate-950/80 to-transparent">
                            <span class="bg-blue-600/20 text-blue-400 border border-blue-500/30 text-[8px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Part Visual</span>
                        </div>
                    </div>
                    <div class="p-8">
                        <div class="flex justify-between items-start mb-8">
                            <div class="flex-1 pr-4">
                                <h3 class="font-black text-white text-xl leading-tight mb-2 tracking-tight">${i.name}</h3>
                                <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.25em]">Registry ID</p>
                            </div>
                            <div class="text-right">
                                <span class="text-5xl font-black ${parseInt(i.qty) <= 0 ? 'text-red-500' : 'text-blue-500'} tabular-nums tracking-tighter quantity-badge">${i.qty}</span>
                                <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em] mt-2 tracking-widest">Unit Count</p>
                                <p class="text-[8px] text-slate-600 font-bold mt-1 tracking-wider opacity-80">${i.updatedAt}</p>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <div class="bg-slate-900/50 rounded-[1.5rem] p-6 border border-white/5">
                                <p class="text-[9px] text-slate-500 font-black mb-3 uppercase italic tracking-widest opacity-60">Tech Specification</p>
                                <p class="text-sm text-slate-400 leading-relaxed font-bold">${i.spec || 'Information not provided.'}</p>
                            </div>
                            <button onclick="analyzePart('${i.name.replace(/'/g, "\\'")}', '${i.spec.replace(/'/g, "\\'")}')" class="w-full py-5 bg-white text-slate-950 rounded-[1.2rem] text-[11px] font-black shadow-lg hover:bg-blue-600 hover:text-white transition-all flex items-center justify-center gap-2 active:scale-95 tracking-widest uppercase">✨ AI Deep Diagnosis</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        async function callGemini(prompt, systemPrompt) {
            // 提醒：若 09-2025 預覽版日後失效，請替換為當下最新穩定版號 (例如 gemini-1.5-flash)
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
            for (let i = 0; i < 5; i++) { try { const response = await fetch(endpoint, { method: 'POST', body: JSON.stringify(payload) }); const result = await response.json(); return result.candidates?.[0]?.content?.parts?.[0]?.text || "System analyzing..."; } catch (e) { await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000)); } } return "Connection timeout.";
        }

        async function analyzePart(name, spec) { showModal("正在執行專家診斷中..."); const result = await callGemini(`料號：${name}\n規格：${spec}`, "你是一位工業零件專家。提供功能、維護及技術格言（繁體中文）。"); updateModalContent(result); }
        async function analyzeFullInventory() { if (db.length === 0) return; showModal("正在執行全局庫存策略推演..."); const result = await callGemini(`庫存數據：${db.map(i => `${i.name}:${i.qty}`).join(", ")}`, "你是一位庫存策略官。提供 3 點庫存優化建議（繁體中文）。"); updateModalContent(result); }
        function showModal(t) { document.getElementById('aiContent').innerHTML = `<div class="py-24 text-center"><div class="w-12 h-12 border-2 border-slate-800 border-t-blue-500 rounded-full animate-spin mx-auto mb-8"></div><p class="animate-pulse text-slate-600 font-bold tracking-widest uppercase text-xs">${t}</p></div>`; document.getElementById('aiModal').classList.remove('hidden'); }
        function updateModalContent(t) { document.getElementById('aiContent').innerHTML = t.replace(/\n/g, '<br>'); }
        function closeModal() { document.getElementById('aiModal').classList.add('hidden'); }
        window.onload = loadData;
    </script>
</body>
</html>
