<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xue-Hong Inventory v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 深色玻璃風格 (Dark Glass UI) */
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-btn.active { background: #3b82f6; color: white; }
    </style>
</head>
<body class="p-4">
    <header class="text-center mb-6">
        <h1 class="text-2xl font-bold text-blue-400">學宏庫存管理 v5</h1>
        <p class="text-xs text-slate-400 mt-1">Status: <span id="status-live">LIVE: 0</span></p>
    </header>

    <nav class="flex justify-around gap-2 mb-6 overflow-x-auto pb-2">
        <button onclick="changeCategory('COLLECTION')" id="btn-COLLECTION" class="tab-btn active px-4 py-2 rounded-full glass-card text-sm transition">收藏</button>
        <button onclick="changeCategory('FRIDGE')" id="btn-FRIDGE" class="tab-btn px-4 py-2 rounded-full glass-card text-sm transition">冰箱</button>
        <button onclick="changeCategory('BOOKS')" id="btn-BOOKS" class="tab-btn px-4 py-2 rounded-full glass-card text-sm transition">書櫃</button>
        <button onclick="changeCategory('WARDROBE')" id="btn-WARDROBE" class="tab-btn px-4 py-2 rounded-full glass-card text-sm transition">衣櫃</button>
    </nav>

    <div id="data-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec"; // 
        let currentCat = "COLLECTION";

        // 分類切換邏輯 [cite: 85-86]
        function changeCategory(cat) {
            currentCat = cat;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${cat}`).classList.add('active');
            loadData();
        }

        async function loadData() {
            const container = document.getElementById('data-container');
            container.innerHTML = '<p class="text-center col-span-full">載入中...</p>';
            
            try {
                // 向後端請求特定分類的 CSV [cite: 52-55, 91]
                const resp = await fetch(`${API_URL}?path=csv&cat=${currentCat}`);
                const csv = await resp.text();
                const lines = csv.trim().split('\n').slice(1); // 跳過標題
                
                document.getElementById('status-live').innerText = `LIVE: ${lines.length}`;
                container.innerHTML = "";

                lines.forEach(line => {
                    const [name, spec, url, qty, date] = line.split(',');
                    const card = createCard(name, spec, url, qty, date);
                    container.appendChild(card);
                });
            } catch (err) {
                container.innerHTML = `<p class="text-red-400 text-center col-span-full">錯誤: ${err}</p>`;
            }
        }

        function createCard(name, spec, url, qty, date) {
            const div = document.createElement('div');
            div.className = "glass-card p-4 rounded-xl relative overflow-hidden";
            
            // 冰箱專用：過期提醒邏輯 [cite: 93-98]
            let badge = "";
            if (currentCat === "FRIDGE") {
                const expiryDate = new Date(spec); // 假設 spec 格式為 YYYY-MM-DD
                const today = new Date();
                const diffDays = (expiryDate - today) / (1000 * 60 * 60 * 24);
                
                if (diffDays < 0) badge = `<span class="bg-red-500 text-[10px] px-2 py-1 rounded absolute top-2 right-2">已過期</span>`;
                else if (diffDays <= 3) badge = `<span class="bg-yellow-500 text-black text-[10px] px-2 py-1 rounded absolute top-2 right-2">快到期</span>`;
                else badge = `<span class="bg-green-500 text-[10px] px-2 py-1 rounded absolute top-2 right-2">新鮮</span>`;
            }

            div.innerHTML = `
                ${badge}
                <img src="${url}" class="w-full h-40 object-cover rounded-lg mb-3" onerror="this.src='https://placehold.co/400x300?text=No+Image'">
                <h3 class="font-bold text-lg">${name}</h3>
                <p class="text-sm text-slate-400">${spec}</p>
                <div class="flex justify-between mt-3 items-center">
                    <span class="text-blue-400 font-mono text-xl">x${qty}</span>
                    <span class="text-[10px] text-slate-500">${date}</span>
                </div>
            `;
            return div;
        }

        // 初始載入
        loadData();
    </script>
</body>
</html>
