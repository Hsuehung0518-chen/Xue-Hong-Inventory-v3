<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零件庫存智慧查詢系統 v3.0 | 學宏 AI 工作坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background-color: #f8fafc;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 科技感美化 */
        .glass-header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        .item-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #f1f5f9;
        }
        
        .item-card:active { transform: scale(0.96); }

        .ai-shimmer {
            background: linear-gradient(90deg, #2563eb, #7c3aed, #2563eb);
            background-size: 200% auto;
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            to { background-position: 200% center; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }

        /* 隱藏捲軸但保持滾動 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }
    </style>
</head>
<body class="min-h-screen flex justify-center">

    <div class="w-full max-w-md min-h-screen flex flex-col bg-white shadow-2xl relative overflow-hidden">
        
        <!-- 🛡️ Header: 智慧戰略中心 -->
        <header class="glass-header p-6 sticky top-0 z-40 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-white font-black text-xl tracking-tighter flex items-center gap-2">
                        <span class="text-2xl">📦</span> 庫存智慧中心
                    </h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-[10px] text-blue-400 font-black uppercase tracking-[0.2em]">Xue-Hong v3.0.3</span>
                        <div id="statusDot" class="status-dot bg-slate-600"></div>
                    </div>
                </div>
                <div id="syncBadge" class="text-[9px] font-black px-3 py-1 rounded-full border border-slate-700 text-slate-500 uppercase tracking-widest">
                    Standby
                </div>
            </div>

            <!-- 🔍 智慧搜尋導航 -->
            <div class="relative group">
                <input type="text" id="filterInput" oninput="runFilter()" 
                       placeholder="搜尋料號、名稱或規格細節..." 
                       class="w-full p-4 pl-12 rounded-2xl bg-slate-800/60 text-white border border-slate-700 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-500 shadow-inner">
                <span class="absolute left-4 top-4 text-xl opacity-40 group-focus-within:opacity-100 transition-opacity">🔍</span>
            </div>

            <!-- ✨ AI 全域推演按鈕 -->
            <button onclick="analyzeFullInventory()" class="w-full mt-4 py-4 ai-shimmer text-white rounded-2xl text-[11px] font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all uppercase tracking-[0.1em]">
                ✨ 全局庫存智慧策略推演
            </button>
        </header>

        <!-- 📊 Main: 數據實體顯示區 -->
        <main id="itemList" class="flex-1 p-5 space-y-5 overflow-y-auto bg-slate-50/30 no-scrollbar">
            <div id="loadingInfo" class="flex flex-col items-center justify-center py-32 text-slate-400">
                <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin mb-6 shadow-sm"></div>
                <p class="font-black text-sm tracking-widest animate-pulse">正在穿透雲端獲取資產數據...</p>
                <p class="text-[9px] mt-2 opacity-50 uppercase tracking-[0.3em] font-black text-blue-600">Establishing Secure Stream</p>
            </div>
        </main>

        <!-- 🪄 AI Modal: 智囊對話視窗 -->
        <div id="aiModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-md hidden">
            <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[85vh] animate-fade-in border border-white/20">
                <div class="p-6 bg-slate-900 text-white flex justify-between items-center border-b border-slate-800">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full ai-shimmer flex items-center justify-center text-xs">✨</div>
                        <h3 class="font-black text-sm tracking-tighter uppercase">AI Strategic Insight</h3>
                    </div>
                    <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-800 transition-colors">✕</button>
                </div>
                <div id="aiContent" class="p-8 overflow-y-auto text-sm text-slate-700 leading-relaxed font-medium bg-gradient-to-b from-white to-slate-50">
                    <!-- AI Content Injection -->
                </div>
                <div class="p-6 bg-white border-t border-slate-100">
                    <button onclick="closeModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-xs font-black shadow-xl active:scale-95 transition-all">確認接收與應用</button>
                </div>
            </div>
        </div>

        <!-- 🦶 Footer: 品牌與健康提醒 -->
        <footer class="p-6 bg-white border-t border-slate-50 flex flex-col items-center gap-3">
            <div class="flex gap-4 opacity-10 grayscale hover:grayscale-0 transition-all duration-700 cursor-default">
                <span>🛡️</span><span>📊</span><span>🎨</span><span>⚙️</span><span>🤝</span><span>⚖️</span><span>💰</span>
            </div>
            <p class="text-[9px] text-slate-300 font-black uppercase tracking-[0.4em]">Seven-Star Strategic System</p>
        </footer>
    </div>

    <script>
        /**
         * 💎 學宏 AI 工作坊：核心底層驅動程式 (v3.0.3)
         * 維護者：Workflow Architect (⚙️)
         */
        const apiKey = ""; // API Key 由執行環境自動注入
        const SHEET_ID = "2PACX-1vRNTdZpaHZ0QrhSEdL4aBHTraHZ7kf-cpi8SLIayDzAr2Dke7u50wqDSadAkwaTkXBsg8hnJfv-B5Gf";
        
        // 🛡️ 高相容性數據通路：強制導向單一工作表 CSV
        const FETCH_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?gid=0&single=true&output=csv`;

        let db = [];

        async function loadData() {
            const listEl = document.getElementById('itemList');
            const badge = document.getElementById('syncBadge');
            const dot = document.getElementById('statusDot');

            try {
                badge.innerText = "LINKING";
                badge.className = "text-[9px] font-black px-3 py-1 rounded-full border border-blue-600 text-blue-600 animate-pulse";
                dot.className = "status-dot bg-blue-500 animate-ping";

                // 🛡️ 極簡 Fetch 策略：移除所有 header 避免沙盒攔截
                const response = await fetch(`${FETCH_URL}&v=${Date.now()}`, {
                    method: 'GET',
                    mode: 'cors',
                    credentials: 'omit'
                });
                
                if (!response.ok) throw new Error(`HTTP_${response.status}`);
                
                const csvData = await response.text();
                
                // 更穩健的 CSV 解析 (支援包含引號與換行的複雜單元格)
                const rows = csvData.split(/\r?\n/).filter(r => r.trim() !== "").map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                if (rows.length < 2) throw new Error("Cloud_Stream_Empty");

                // 資料映射與清洗
                db = rows.slice(1).map(row => ({
                    name: (row[0] || "").replace(/"/g, "").trim(),
                    spec: (row[1] || "").replace(/"/g, "").trim(),
                    photo: (row[2] || "").replace(/"/g, "").trim(),
                    qty: (row[3] || "0").replace(/"/g, "").trim()
                })).filter(i => i.name && i.name !== "");

                badge.innerText = `LIVE: ${db.length} ITEMS`;
                badge.className = "text-[9px] font-black px-3 py-1 rounded-full border border-green-600 text-green-600 font-bold";
                dot.className = "status-dot bg-green-500";
                
                runFilter();

            } catch (e) {
                console.error("Sync Failure:", e);
                badge.innerText = "OFFLINE";
                badge.className = "text-[9px] font-black px-3 py-1 rounded-full border border-red-500 text-red-500 font-bold";
                dot.className = "status-dot bg-red-500";
                
                listEl.innerHTML = `
                    <div class="p-10 text-center bg-red-50 rounded-[2.5rem] border border-red-100 animate-fade-in shadow-inner mx-4">
                        <div class="text-5xl mb-6">📡</div>
                        <p class="text-red-700 font-black mb-3 text-lg">雲端數據隧道中斷</p>
                        <p class="text-[11px] text-red-400 mb-8 leading-relaxed font-bold uppercase tracking-tighter">
                            Error Log: ${e.message}<br>
                            請確認 Google Sheet 已「發佈到網路」<br>且為 CSV 格式。
                        </p>
                        <button onclick="location.reload()" class="w-full py-5 bg-red-600 text-white rounded-2xl text-xs font-black shadow-2xl active:scale-95 transition-all uppercase">
                            重新初始化連線工程
                        </button>
                    </div>`;
            }
        }

        function runFilter() {
            const term = document.getElementById('filterInput').value.toLowerCase();
            const listEl = document.getElementById('itemList');
            
            const results = db.filter(i => 
                i.name.toLowerCase().includes(term) || 
                i.spec.toLowerCase().includes(term)
            );

            if (results.length === 0) {
                listEl.innerHTML = `
                    <div class="flex flex-col items-center py-32 text-slate-300 animate-fade-in">
                        <span class="text-7xl mb-6 opacity-20">🔎</span>
                        <p class="text-sm font-black italic tracking-widest">找不到符合的零件資產...</p>
                        <p class="text-[9px] mt-2 uppercase opacity-40">Try searching another ID</p>
                    </div>`;
                return;
            }

            listEl.innerHTML = results.map((i, idx) => `
                <div class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-100 shadow-sm item-card animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                    ${i.photo && i.photo.startsWith('http') ? 
                        `<div class="w-full h-56 bg-slate-100 overflow-hidden relative border-b border-slate-50">
                            <img src="${i.photo}" class="w-full h-full object-cover" 
                                 onerror="this.parentElement.style.display='none'">
                            <div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent pointer-events-none"></div>
                        </div>` : ''
                    }
                    <div class="p-7">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex-1 pr-6">
                                <h3 class="font-black text-slate-900 text-xl leading-tight mb-2 tracking-tighter">${i.name}</h3>
                                <span class="bg-blue-50 text-blue-700 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-sm">Asset ID</span>
                            </div>
                            <div class="text-right">
                                <span class="text-5xl font-black ${parseInt(i.qty) <= 0 ? 'text-red-500' : 'text-slate-900'} tabular-nums tracking-tighter transition-colors">
                                    ${i.qty}
                                </span>
                                <p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mt-2">Stock</p>
                            </div>
                        </div>
                        <div class="space-y-5">
                            <div class="bg-slate-50/80 rounded-3xl p-5 border border-slate-100/50">
                                <p class="text-[9px] text-slate-400 font-black mb-2 uppercase italic tracking-widest opacity-80">Tech Specification</p>
                                <p class="text-sm text-slate-700 leading-relaxed font-bold">${i.spec || 'No additional data provided.'}</p>
                            </div>
                            
                            <!-- ✨ AI 零件深度分析按鈕 -->
                            <button onclick="analyzePart('${i.name}', '${i.spec.replace(/'/g, "\\'")}')" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-[11px] font-black shadow-lg hover:bg-blue-600 transition-all flex items-center justify-center gap-2 uppercase tracking-widest active:scale-95">
                                ✨ AI Deep Analysis
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ==========================================
        // ✨ Gemini AI Core Integration
        // ==========================================
        
        async function callGemini(prompt, systemPrompt) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error("Gemini_API_Link_Failed");
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text || "AI 分析暫時中斷，請重試。";
                } catch (e) {
                    await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000));
                }
            }
            return "AI 連線超時，請檢查您的網路與 API 狀態。";
        }

        async function analyzePart(name, spec) {
            showModal("正在召喚零件專家進行深度診斷...");
            const sys = "你是一位具備 30 年經驗的機械電子零件專家。請針對指定零件提供精確、實務且具啟發性的分析。使用繁體中文。格式：1.功能核心 2.維修預警 3.專家箴言。";
            const prompt = `零件名稱：${name}\n技術規格：${spec}`;
            const result = await callGemini(prompt, sys);
            updateModalContent(result);
        }

        async function analyzeFullInventory() {
            if (db.length === 0) return;
            showModal("正在執行全庫存壓力測試與資源推演...");
            const sys = "你是一位專精於庫存變現與資源優化的戰略官。請分析庫存清單並提供 3 點具備大局觀的策略建議。使用繁體中文。";
            const summary = db.map(i => `${i.name}(數量:${i.qty})`).join(", ");
            const prompt = `當前庫存清單：${summary}`;
            const result = await callGemini(prompt, sys);
            updateModalContent(result);
        }

        function showModal(initialText) {
            const modal = document.getElementById('aiModal');
            const content = document.getElementById('aiContent');
            content.innerHTML = `
                <div class="flex flex-col items-center gap-8 py-20">
                    <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
                    <p class="animate-pulse font-black text-slate-400 italic text-sm tracking-widest">${initialText}</p>
                </div>`;
            modal.classList.remove('hidden');
        }

        function updateModalContent(text) {
            document.getElementById('aiContent').innerText = text;
        }

        function closeModal() {
            document.getElementById('aiModal').classList.add('hidden');
        }

        // 初始化系統
        window.onload = loadData;
    </script>
</body>
</html>
