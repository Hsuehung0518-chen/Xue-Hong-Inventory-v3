<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>零件庫存智慧查詢系統 v4.1</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- UI Style（原樣保留） -->
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
body{font-family:'Noto Sans TC',sans-serif;background:#020617;color:#f8fafc}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#0f172a}
::-webkit-scrollbar-thumb{background:#1e293b;border-radius:10px}
.glass-header{background:rgba(2,6,23,0.85);backdrop-filter:blur(25px);border-bottom:1px solid rgba(255,255,255,0.05)}
.item-card{background:rgba(15,23,42,0.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.03);transition:.4s}
.item-card:hover{border-color:rgba(59,130,246,0.4)}
.ai-shimmer{background:linear-gradient(90deg,#1d4ed8,#7c3aed,#1d4ed8);background-size:200% auto;animation:shimmer 3s linear infinite}
@keyframes shimmer{to{background-position:200% center}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.animate-fade-in{animation:fadeInUp .6s ease-out forwards}
.img-container{width:100%;height:280px;background:#0f172a;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
.img-container img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1.2s;z-index:1}
.img-loaded img{opacity:1}
.img-placeholder{position:absolute;font-size:3rem;opacity:.15;z-index:0}
.quantity-badge{text-shadow:0 0 25px rgba(59,130,246,.6)}
</style>

</head>
<body class="min-h-screen flex justify-center">

<div class="w-full max-w-md min-h-screen flex flex-col relative overflow-hidden bg-slate-950 border-x border-white/5">

<header class="glass-header p-6 sticky top-0 z-40 shadow-2xl">
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-white font-black text-xl tracking-tighter flex items-center gap-2">
                <span class="text-2xl text-blue-500">🛡️</span> 庫存智慧中心
            </h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="text-[10px] text-slate-500 font-black uppercase tracking-[0.2em]">Xue-Hong v4.1</span>
                <div id="statusDot" class="w-2 h-2 rounded-full bg-slate-700 transition-colors"></div>
            </div>
        </div>
        <div id="syncBadge" class="text-[9px] font-black px-3 py-1 rounded-full border border-slate-800 text-slate-500 uppercase">Standby</div>
    </div>

    <div class="relative">
        <input type="text" id="filterInput" oninput="runFilter()"
        placeholder="搜尋料號或規格..."
        class="w-full p-4 pl-12 rounded-2xl bg-slate-900/90 text-white border border-slate-800 focus:border-blue-500/50 focus:ring-4 focus:ring-blue-500/10 outline-none placeholder:text-slate-700 shadow-inner"/>
        <span class="absolute left-4 top-4 text-xl opacity-20">🔍</span>
    </div>

    <button onclick="analyzeFullInventory()"
    class="w-full mt-4 py-4 ai-shimmer text-white rounded-2xl text-[11px] font-black shadow-lg flex justify-center gap-2 active:scale-95 uppercase tracking-widest">
        ✨ 啟動 AI 全局策略分析
    </button>
</header>

<main id="itemList" class="flex-1 p-5 space-y-8 overflow-y-auto pb-32">
    <div id="loadingInfo" class="flex flex-col items-center justify-center py-48 text-slate-700">
        <div class="w-10 h-10 border-2 border-slate-800 border-t-blue-500 rounded-full animate-spin mb-6"></div>
        <p class="font-bold text-xs tracking-widest animate-pulse uppercase">Synchronizing Assets...</p>
    </div>
</main>

<footer class="p-6 bg-slate-950/80 backdrop-blur-md border-t border-white/5 flex flex-col items-center gap-2 fixed bottom-0 w-full max-w-md">
    <p class="text-[9px] text-slate-700 font-black uppercase tracking-[0.4em]">Seven-Star Strategic System</p>
</footer>

</div>

<!-- AI 視窗 -->
<div id="aiModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-2xl hidden">
    <div class="bg-slate-900 w-full max-w-sm rounded-[2.5rem] overflow-hidden border border-white/5 flex flex-col max-h-[85vh] animate-fade-in">
        <div class="p-6 bg-slate-800/50 text-white flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full ai-shimmer flex justify-center items-center text-xs">✨</div>
                <h3 class="font-black text-xs tracking-widest uppercase">AI Strategic Insight</h3>
            </div>
            <button onclick="closeModal()" class="w-8 h-8 flex justify-center items-center rounded-full hover:bg-slate-800">✕</button>
        </div>
        <div id="aiContent" class="p-8 overflow-y-auto text-sm text-slate-300 leading-relaxed"></div>
        <div class="p-6">
            <button onclick="closeModal()" class="w-full py-4 bg-white text-slate-900 rounded-2xl text-xs font-black shadow-xl active:scale-95 uppercase tracking-widest">
                確認並關閉
            </button>
        </div>
    </div>
</div>

<script>
/********* 🔐 Token（5 分鐘） *********/
const EXEC_URL = "https://script.google.com/macros/s/AKfycbxrXhlawdbmn_8olWWazxgBugCfbMXhVBvsj9sSHOEjVRchz3DQrpbSngbJeKwY-1Kj/exec";
const SECRET_KEY = "XUEHONG_SUPER_SECRET_KEY_2026";

async function genSignedToken(){
    const ts=Math.floor(Date.now()/1000);
    const enc=new TextEncoder();
    const key=await crypto.subtle.importKey("raw",enc.encode(SECRET_KEY),{name:"HMAC",hash:"SHA-256"},false,["sign"]);
    const sigBuf=await crypto.subtle.sign("HMAC",key,enc.encode(String(ts)));
    const bytes=new Uint8Array(sigBuf);
    let bin=""; bytes.forEach(b=>bin+=String.fromCharCode(b));
    const sig=btoa(bin).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,"");
    return {ts,sig};
}

/********* 📥 讀取資料（CSV API） *********/
let db=[];

async function loadData(){
    const dot=document.getElementById("statusDot");
    const badge=document.getElementById("syncBadge");
    const list=document.getElementById("itemList");

    badge.innerText="LINKING"; badge.className="text-[9px] font-black px-3 py-1 rounded-full border border-blue-900 text-blue-500 animate-pulse";
    dot.className="w-2 h-2 rounded-full bg-blue-500 animate-ping";

    try{
        const {ts,sig}=await genSignedToken();
        const url=`${EXEC_URL}?path=csv&ts=${ts}&sig=${sig}`;
        const res=await fetch(url);
        const csv=await res.text();

        const rows=csv.split(/\r?\n/).filter(r=>r.trim()!=="").map(r=>r.split(","));
        db=rows.slice(1).map(r=>({
            name:r[0]||"",
            spec:r[1]||"",
            photo:r[2]||"",
            qty:r[3]||"0",
            updatedAt:r[4]||""
        }));

        dot.className="w-2 h-2 rounded-full bg-green-500";
        badge.innerText="LIVE: "+db.length;
        badge.className="text-[9px] font-black px-3 py-1 rounded-full border border-green-900 text-green-500";

        runFilter();
    }catch(e){
        dot.className="w-2 h-2 rounded-full bg-red-600";
        list.innerHTML=`<div class='p-12 text-center bg-red-950/20 rounded-[2.5rem] border border-red-900/30'>
        <p class='text-red-500 font-black mb-4 text-lg'>Load Error</p>
        <button onclick="location.reload()" class="py-3 w-full bg-red-600 text-white rounded-xl text-xs font-bold">Retry</button>
        </div>`;
    }
}

/********* 🖼 圖片代理 *********/
async function fixImageUrl(id){
    if(!id) return "";
    const {ts,sig}=await genSignedToken();
    return `${EXEC_URL}?path=image&id=${id}&ts=${ts}&sig=${sig}`;
}

/********* 🔍 篩選 *********/
async function runFilter(){
    const term=document.getElementById("filterInput").value.toLowerCase();
    const list=document.getElementById("itemList");

    const results=db.filter(i=>i.name.toLowerCase().includes(term)||i.spec.toLowerCase().includes(term));
    if(results.length===0){
        list.innerHTML=`<div class="py-40 text-center text-slate-700">No Results</div>`;
        return;
    }

    let html="";
    for(let i=0;i<results.length;i++){
        const item=results[i];
        const img=item.photo?`<img src="${item.photo}" onload="this.parentElement.classList.add('img-loaded')" />`:"";

        html+=`
        <div class="rounded-[2.5rem] overflow-hidden item-card animate-fade-in shadow-2xl" style="animation-delay:${i*0.05}s">
            <div class="img-container">
                <span class="img-placeholder">🛠️</span>
                ${img}
            </div>
            <div class="p-8">
                <div class="flex justify-between mb-8">
                    <div><h3 class="font-black text-white text-xl">${item.name}</h3>
                    <p class="text-[10px] text-slate-500 uppercase">Registry ID</p></div>
                    <div class="text-right">
                        <span class="text-5xl font-black ${parseInt(item.qty)<=0?"text-red-500":"text-blue-500"}">${item.qty}</span>
                        <p class="text-[10px] text-slate-500 uppercase mt-2">Unit Count</p>
                        <p class="text-[8px] text-slate-600 mt-1">${item.updatedAt}</p>
                    </div>
                </div>

                <div class="bg-slate-900/50 rounded-[1.5rem] p-6 border border-white/5 mb-6">
                    <p class="text-[9px] text-slate-500 mb-2 uppercase italic">Tech Specification</p>
                    <p class="text-sm text-slate-400">${item.spec||"N/A"}</p>
                </div>

                <button onclick="analyzePart('${item.name}','${item.spec}')"
                    class="w-full py-5 bg-white text-slate-950 rounded-[1.2rem] text-[11px] font-black shadow-lg active:scale-95 tracking-widest uppercase">
                    ✨ AI Deep Diagnosis
                </button>
            </div>
        </div>`;
    }
    list.innerHTML=html;
}

/********* 🤖 AI *********/
async function callGemini(prompt){
    return "AI 功能保持原樣（此處省略 API KEY）";
}
function analyzePart(name,spec){showModal("分析中...");callGemini("").then(t=>updateModalContent(t))}
function analyzeFullInventory(){showModal("全局分析中...");callGemini("").then(t=>updateModalContent(t))}
function showModal(t){document.getElementById("aiContent").innerHTML=t;document.getElementById("aiModal").classList.remove("hidden")}
function updateModalContent(t){document.getElementById("aiContent").innerHTML=t}
function closeModal(){document.getElementById("aiModal").classList.add("hidden")}

window.onload=loadData;
</script>

</body>
</html>
