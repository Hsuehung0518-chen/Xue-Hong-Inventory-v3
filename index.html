<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏 @ 博毅坊 | 數位門戶 v5.4.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; overflow: hidden; }
        .paifang-canvas { background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%); min-height: 100vh; }
        .glass-plaque { background: rgba(30, 41, 59, 0.3); backdrop-filter: blur(25px); border-top: 4px solid #3b82f6; }
        .category-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); transition: 0.4s; }
        .category-card:hover { transform: translateY(-8px); border-color: #3b82f6; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2); }
        @keyframes rotateGear { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .hover-gear:hover { animation: rotateGear 2s linear infinite; }
    </style>
</head>
<body class="flex items-center justify-center">
    <div class="paifang-canvas w-full flex flex-col items-center justify-center p-4">
        <div id="quote-flow" class="mb-8 text-center opacity-0 transition-opacity duration-1000">
            <div class="inline-block px-6 py-2 rounded-full border border-blue-900/50 bg-blue-950/20 shadow-inner">
                <p id="quote-text" class="text-xs text-blue-200 tracking-wide"></p>
            </div>
        </div>
        <div class="glass-plaque px-8 py-6 lg:py-10 rounded-2xl mb-10 text-center shadow-2xl">
            <h1 class="text-3xl lg:text-6xl font-black tracking-[0.3em] text-white">學宏 @ 博毅坊</h1>
            <p class="text-slate-500 text-[10px] uppercase mt-2 tracking-[0.5em]">The Resolute Workshop</p>
        </div>
        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 w-full max-w-6xl px-4">
            <a href="collection.html" class="category-card p-6 rounded-[2rem] text-center group">
                <div class="text-4xl mb-2">💎</div><div class="font-bold text-sm tracking-widest">私人收藏</div>
            </a>
            <a href="fridge.html" class="category-card p-6 rounded-[2rem] text-center group">
                <div class="text-4xl mb-2">❄️</div><div class="font-bold text-sm tracking-widest">智慧冰箱</div>
            </a>
            <a href="books.html" class="category-card p-6 rounded-[2rem] text-center group">
                <div class="text-4xl mb-2">📚</div><div class="font-bold text-sm tracking-widest">私人書藏</div>
            </a>
            <a href="wardrobe.html" class="category-card p-6 rounded-[2rem] text-center group">
                <div class="text-4xl mb-2">👔</div><div class="font-bold text-sm tracking-widest">精品衣櫥</div>
            </a>
        </div>
        <div class="fixed bottom-8 right-8 z-[100] flex flex-col-reverse items-center gap-4">
            <button onclick="document.getElementById('nav-items').classList.toggle('hidden')" class="w-14 h-14 rounded-full bg-blue-600/20 backdrop-blur-xl border border-blue-500/30 text-white flex items-center justify-center hover-gear">⚙️</button>
            <div id="nav-items" class="hidden flex flex-col gap-4 mb-4">
                <a href="upload.html" title="入庫工位" class="w-12 h-12 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center text-lg hover:border-blue-500">📸</a>
                <button onclick="location.reload()" class="w-12 h-12 rounded-full bg-slate-900 border border-slate-700 flex items-center justify-center">🔄</button>
            </div>
        </div>
    </div>
    <script>
        const quotes = [{t:"「博觀而約取，厚積而薄發。」",a:"— 蘇軾"}, {t:"“Stay hungry, stay foolish.”",a:"— Steve Jobs"}];
        window.onload = () => {
            const q = quotes[Math.floor(Math.random()*quotes.length)];
            document.getElementById('quote-text').innerText = `${q.t} ${q.a}`;
            document.getElementById('quote-flow').style.opacity = 1;
        };
    </script>
</body>
</html>
