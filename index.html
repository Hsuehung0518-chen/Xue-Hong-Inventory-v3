<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>零件庫存智慧查詢系統 v3.0 | 學宏 AI 工作坊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .glass-header { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(51, 65, 85, 0.5); }
        .item-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .item-card:active { transform: scale(0.96); }
        .ai-shimmer { background: linear-gradient(90deg, #2563eb, #7c3aed, #2563eb); background-size: 200% auto; animation: shimmer 3s linear infinite; }
        @keyframes shimmer { to { background-position: 200% center; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeInUp 0.5s ease-out forwards; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex justify-center">

    <div class="w-full max-w-md min-h-screen flex flex-col bg-white shadow-2xl relative overflow-hidden">
        
        <!-- Header: 智慧戰略中心 -->
        <header class="glass-header p-6 sticky top-0 z-40 shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="text-white font-black text-xl tracking-tighter flex items-center gap-2">
                        <span class="text-2xl">📦</span> 庫存智慧中心
                    </h1>
                    <div class="flex items-center gap-2 mt-1">
                        <span class="text-[10px] text-blue-400 font-black uppercase tracking-[0.2em]">Xue-Hong v3.0.8</span>
                        <div id="statusDot" class="w-2 h-2 rounded-full bg-slate-600"></div>
                    </div>
                </div>
                <div id="syncBadge" class="text-[9px] font-black px-3 py-1 rounded-full border border-slate-700 text-slate-500 uppercase tracking-widest">Standby</div>
            </div>

            <div class="relative group">
                <input type="text" id="filterInput" oninput="runFilter()" 
                       placeholder="搜尋料號、名稱或規格..." 
                       class="w-full p-4 pl-12 rounded-2xl bg-slate-800/60 text-white border border-slate-700 focus:border-blue-500 focus:ring-4 focus:ring-blue-500/20 outline-none transition-all placeholder:text-slate-500 shadow-inner">
                <span class="absolute left-4 top-4 text-xl opacity-40 group-focus-within:opacity-100 transition-opacity">🔍</span>
            </div>

            <button onclick="analyzeFullInventory()" class="w-full mt-4 py-4 ai-shimmer text-white rounded-2xl text-[11px] font-black shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-all uppercase tracking-[0.1em]">✨ 全局庫存智慧策略推演</button>
        </header>

        <!-- Main: 數據實體層 -->
        <main id="itemList" class="flex-1 p-5 space-y-5 overflow-y-auto bg-slate-50/30 no-scrollbar">
            <div id="loadingInfo" class="flex flex-col items-center justify-center py-32 text-slate-400">
                <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin mb-6 shadow-sm"></div>
                <p class="font-black text-sm tracking-widest animate-pulse">正在精確導航雲端數據...</p>
                <p class="text-[9px] mt-2 opacity-50 uppercase tracking-[0.3em] font-black text-blue-600">Secure Protocol Active</p>
            </div>
        </main>

        <!-- AI Modal -->
        <div id="aiModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/90 backdrop-blur-md hidden">
            <div class="bg-white w-full max-w-sm rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col max-h-[85vh] animate-fade-in">
                <div class="p-6 bg-slate-900 text-white flex justify-between items-center border-b border-slate-800">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full ai-shimmer flex items-center justify-center text-xs">✨</div>
                        <h3 class="font-black text-sm tracking-tighter uppercase">AI Strategic Insight</h3>
                    </div>
                    <button onclick="closeModal()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-slate-800 transition-colors">✕</button>
                </div>
                <div id="aiContent" class="p-8 overflow-y-auto text-sm text-slate-700 leading-relaxed font-medium bg-slate-50"></div>
                <div class="p-6 bg-white border-t border-slate-100">
                    <button onclick="closeModal()" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-xs font-black shadow-xl active:scale-95 transition-all">確認接收策略</button>
                </div>
            </div>
        </div>

        <footer class="p-6 bg-white border-t border-slate-50 flex flex-col items-center gap-3">
            <p class="text-[9px] text-slate-300 font-black uppercase tracking-[0.4em]">Seven-Star Strategic System</p>
        </footer>
    </div>

    <script>
        /**
         * 💎 學宏 AI 工作坊：核心底層驅動 (v3.0.8 終極通訊版)
         */
        const apiKey = ""; 
        
        // 🛡️ [極致精確] 使用您提供的 2PACX-1vS8n... 完整網址作為底層數據源
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS8nkx1MrkeZ_xhnvzCG9_v03AnyR6rK58DhNRxULaSmVEgUFByTZ2TLRT62gOQ8q_8RSy2e05ag8qw/pub?output=csv";

        let db = [];

        async function loadData() {
            const listEl = document.getElementById('itemList');
            const badge = document.getElementById('syncBadge');
            const dot = document.getElementById('statusDot');

            try {
                badge.innerText = "LINKING";
                badge.className = "text-[9px] font-black px-3 py-1 rounded-full border border-blue-600 text-blue-600 animate-pulse";
                dot.className = "w-2 h-2 rounded-full bg-blue-500 animate-ping";

                // 🛡️ 採用極簡請求，移除所有 headers 以避免手機瀏覽器 CORS 預檢失敗
                const response = await fetch(`${CSV_URL}&nocache=${Date.now()}`);
                
                if (!response.ok) throw new Error(`HTTP_${response.status}`);
                
                const csvData = await response.text();
                
                // 解析 CSV (適配複雜欄位)
                const rows = csvData.split(/\r?\n/).filter(r => r.trim() !== "").map(row => {
                    return row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                });

                if (rows.length < 2) throw new Error("Cloud_Stream_Empty");

                // 資料映射：料號(A), 規格(B), 照片(C), 數量(D)
                db = rows.slice(1).map(row => ({
                    name: (row[0] || "").replace(/"/g, "").trim(),
                    spec: (row[1] || "").replace(/"/g, "").trim(),
                    photo: (row[2] || "").replace(/"/g, "").trim(),
                    qty: (row[3] || "0").replace(/"/g, "").trim()
                })).filter(i => i.name !== "");

                badge.innerText = `LIVE: ${db.length} ITEMS`;
                badge.className = "text-[9px] font-black px-3 py-1 rounded-full border border-green-600 text-green-600 font-bold";
                dot.className = "w-2 h-2 rounded-full bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]";
                
                runFilter();

            } catch (e) {
                console.error("Sync Failure:", e);
                badge.innerText = "OFFLINE";
                dot.className = "w-2 h-2 rounded-full bg-red-500";
                
                listEl.innerHTML = `
                    <div class="p-10 text-center bg-red-50 rounded-[2.5rem] border border-red-100 animate-fade-in mx-4 shadow-inner">
                        <div class="text-5xl mb-6">📡</div>
                        <p class="text-red-700 font-black mb-3 text-lg tracking-tighter">雲端數據隧道中斷</p>
                        <p class="text-[11px] text-red-500 mb-8 font-bold leading-relaxed">
                            Error Log: ${e.message}<br>
                            請確認手機網路通暢且試算表已發佈
                        </p>
                        <a href="${CSV_URL}" target="_blank" class="block w-full py-4 bg-blue-600 text-white rounded-2xl text-[10px] font-black shadow-lg mb-3 uppercase tracking-widest">點此測試數據源連結</a>
                        <button onclick="location.reload()" class="w-full py-4 bg-red-600 text-white rounded-2xl text-[10px] font-black shadow-lg active:scale-95 transition-all uppercase tracking-widest">重試連線</button>
                    </div>`;
            }
        }

        function runFilter() {
            const term = document.getElementById('filterInput').value.toLowerCase();
            const listEl = document.getElementById('itemList');
            const results = db.filter(i => i.name.toLowerCase().includes(term) || i.spec.toLowerCase().includes(term));
            
            if (results.length === 0) {
                listEl.innerHTML = `<div class="flex flex-col items-center py-32 text-slate-300 animate-fade-in"><span class="text-7xl mb-6 opacity-20">🔎</span><p class="text-sm font-black italic tracking-widest">查無對應之零件資產...</p></div>`;
                return;
            }

            listEl.innerHTML = results.map((i, idx) => `
                <div class="bg-white rounded-[2.5rem] overflow-hidden border border-slate-100 shadow-sm item-card animate-fade-in" style="animation-delay: ${idx * 0.05}s">
                    ${i.photo && i.photo.startsWith('http') ? `<div class="w-full h-56 bg-slate-100 overflow-hidden relative border-b border-slate-50"><img src="${i.photo}" class="w-full h-full object-cover" onerror="this.parentElement.style.display='none'"></div>` : ''}
                    <div class="p-7">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex-1 pr-6"><h3 class="font-black text-slate-900 text-xl leading-tight mb-2 tracking-tighter">${i.name}</h3><span class="bg-blue-50 text-blue-700 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest shadow-sm">Asset ID</span></div>
                            <div class="text-right"><span class="text-5xl font-black ${parseInt(i.qty) <= 0 ? 'text-red-500' : 'text-slate-900'} tabular-nums transition-colors">${i.qty}</span><p class="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mt-2 font-bold tracking-widest">Stock</p></div>
                        </div>
                        <div class="space-y-5">
                            <div class="bg-slate-50 rounded-3xl p-5 border border-slate-100/50"><p class="text-[9px] text-slate-400 font-black mb-2 uppercase italic tracking-widest opacity-80">Tech Specification</p><p class="text-sm text-slate-700 leading-relaxed font-bold">${i.spec || 'No spec provided.'}</p></div>
                            <button onclick="analyzePart('${i.name}', '${i.spec.replace(/'/g, "\\'")}')" class="w-full py-4 bg-slate-900 text-white rounded-2xl text-[11px] font-black shadow-lg hover:bg-blue-600 transition-all flex items-center justify-center gap-2 active:scale-95 tracking-widest uppercase">✨ AI Deep Analysis</button>
                        </div>
                    </div>
                </div>`).join('');
        }

        async function callGemini(prompt, systemPrompt) {
            const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: systemPrompt }] } };
            for (let i = 0; i < 5; i++) { try { const response = await fetch(endpoint, { method: 'POST', body: JSON.stringify(payload) }); const result = await response.json(); return result.candidates?.[0]?.content?.parts?.[0]?.text || "分析中斷。"; } catch (e) { await new Promise(r => setTimeout(r, Math.pow(2, i) * 1000)); } } return "連線超時。";
        }

        async function analyzePart(name, spec) { showModal("正在召喚零件專家進行深度診斷..."); const result = await callGemini(`零件：${name}\n規格：${spec}`, "你是一位機械電子專家。請提供繁體中文分析。"); updateModalContent(result); }
        async function analyzeFullInventory() { if (db.length === 0) return; showModal("資源策略推演中..."); const result = await callGemini(`目前的零件清單：${db.map(i => `${i.name}:${i.qty}`).join(", ")}`, "你是一位庫存戰略官。提供 3 點庫存優化建議（繁體中文）。"); updateModalContent(result); }
        function showModal(t) { document.getElementById('aiContent').innerHTML = `<div class="py-20 text-center"><div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin mx-auto mb-6"></div><p class="animate-pulse text-slate-400 font-bold">${t}</p></div>`; document.getElementById('aiModal').classList.remove('hidden'); }
        function updateModalContent(t) { document.getElementById('aiContent').innerText = t; }
        function closeModal() { document.getElementById('aiModal').classList.add('hidden'); }
        window.onload = loadData;
    </script>
</body>
</html>
