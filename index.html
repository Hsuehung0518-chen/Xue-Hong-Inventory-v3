<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏 @ 博毅坊 | 數位門戶 v5.2.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; overflow-x: hidden; }
        
        /* 牌坊沉浸式畫布 */
        .paifang-canvas { 
            background: radial-gradient(circle at center, #1e1b4b 0%, #020617 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* 桌機端：16:9 比例 */
        @media (min-width: 1024px) {
            .paifang-canvas {
                aspect-ratio: 16 / 9; max-width: 90vw; max-height: 85vh;
                margin: 2rem auto; border: 2px solid rgba(255,255,255,0.05);
                border-radius: 4rem; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
                padding: 3rem;
            }
        }

        /* 手機端：全螢幕流動佈局 */
        @media (max-width: 1023px) {
            .paifang-canvas { min-height: 100vh; padding: 2rem 1rem; }
        }

        /* 牌坊裝飾元素 */
        .glass-plaque {
            background: rgba(30, 41, 59, 0.3); backdrop-filter: blur(25px);
            border-top: 4px solid #3b82f6; border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .category-card {
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .category-card:hover {
            transform: translateY(-8px); background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6; box-shadow: 0 15px 30px rgba(59, 130, 246, 0.2);
        }

        /* 典故區動畫 */
        #quote-flow { animation: fadeInScale 1.5s ease-out; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="paifang-canvas w-full overflow-hidden">
        
        <div id="quote-flow" class="w-full max-w-3xl mb-8 lg:mb-12 px-6 text-center">
            <div class="inline-block px-6 py-2 rounded-full border border-blue-900/50 bg-blue-950/20 shadow-inner">
                <p id="quote-text" class="text-[11px] lg:text-sm text-blue-200 tracking-wide font-light"></p>
                <p id="quote-author" class="text-[9px] text-blue-500 mt-1 uppercase font-bold font-sans"></p>
            </div>
        </div>

        <div class="glass-plaque px-8 lg:px-16 py-6 lg:py-10 rounded-2xl mb-10 lg:mb-16 text-center shadow-2xl">
            <h1 class="text-3xl lg:text-6xl font-black tracking-[0.3em] text-white">學宏 @ 博毅坊</h1>
            <div class="flex items-center justify-center gap-4 mt-4">
                <span class="h-[1px] w-8 lg:w-16 bg-slate-700"></span>
                <p class="text-slate-500 text-[10px] lg:text-sm font-sans tracking-[0.8em] uppercase">The Resolute Workshop</p>
                <span class="h-[1px] w-8 lg:w-16 bg-slate-700"></span>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 lg:gap-8 px-4 lg:px-12 w-full max-w-6xl">
            <a href="collection.html" class="category-card p-6 lg:p-10 rounded-[2rem] text-center group">
                <div class="text-4xl lg:text-6xl mb-4 group-hover:rotate-12 transition">💎</div>
                <div class="font-bold text-sm lg:text-xl tracking-widest">私人收藏</div>
            </a>
            <a href="fridge.html" class="category-card p-6 lg:p-10 rounded-[2rem] text-center group">
                <div class="text-4xl lg:text-6xl mb-4 group-hover:scale-110 transition">❄️</div>
                <div class="font-bold text-sm lg:text-xl tracking-widest">智慧冰箱</div>
            </a>
            <a href="books.html" class="category-card p-6 lg:p-10 rounded-[2rem] text-center group">
                <div class="text-4xl lg:text-6xl mb-4 group-hover:-rotate-12 transition">📚</div>
                <div class="font-bold text-sm lg:text-xl tracking-widest">私人書藏</div>
            </a>
            <a href="wardrobe.html" class="category-card p-6 lg:p-10 rounded-[2rem] text-center group">
                <div class="text-4xl lg:text-6xl mb-4 group-hover:scale-110 transition">👔</div>
                <div class="font-bold text-sm lg:text-xl tracking-widest">精品衣櫥</div>
            </a>
        </div>

        <footer class="absolute bottom-6 w-full text-center px-4">
            <div class="flex justify-center gap-8 items-center text-[9px] text-slate-800 tracking-[0.3em] uppercase">
                <a href="admin.html" class="hover:text-slate-500 transition">Command_Center</a>
                <span class="h-3 w-[1px] bg-slate-900"></span>
                <a href="upload.html" class="hover:text-slate-500 transition">Data_Input</a>
            </div>
        </footer>
    </div>

    <script>
        // 中西典故集 [cite: 2025-10-01]
        const quotes = [
            { text: "「博學而篤志，切問而近思，仁在其中矣。」", author: "—《論語 · 子張》" },
            { text: "「君子求諸己，小人求諸人。」", author: "—《論語 · 衛靈公》" },
            { text: "「三人行，必有我師焉。」", author: "—《論語 · 述而》" },
            { text: "「博觀而約取，厚積而薄發。」", author: "— 蘇軾" },
            { text: "“The important thing is not to stop questioning.”", author: "— Albert Einstein" },
            { text: "“Stay hungry, stay foolish.”", author: "— Steve Jobs" },
            { text: "“Knowledge makes humble, ignorance makes proud.”", author: "— Socrates" },
            { text: "“True humility is not thinking less of yourself; it is thinking of yourself less.”", author: "— C.S. Lewis" },
            { text: "“Everything should be made as simple as possible, but not simpler.”", author: "— Albert Einstein" }
        ];

        function refreshQuote() {
            const idx = Math.floor(Math.random() * quotes.length);
            document.getElementById('quote-text').innerText = quotes[idx].text;
            document.getElementById('quote-author').innerText = quotes[idx].author;
        }

        // 頁面加載時隨機刷新典故
        window.onload = refreshQuote;
    </script>
</body>
</html>
