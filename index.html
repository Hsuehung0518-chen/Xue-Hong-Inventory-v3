<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>博毅坊 - 智慧冰箱歸檔系統</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .bo-yi-fang-container { background: white; width: 100%; max-width: 400px; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; }
        .header h3 { color: #2c3e50; margin-bottom: 5px; }
        .header p { font-size: 14px; color: #7f8c8d; margin-bottom: 20px; }
        .field-group { text-align: left; background: #f8f9fa; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .field-group label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        .field-group input { width: 100%; border: 1px solid #ddd; padding: 10px; border-radius: 8px; box-sizing: border-box; }
        .btn-main { background: #27ae60; color: white; padding: 18px 40px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.2s; width: 100%; }
        .btn-main:active { transform: scale(0.95); }
        #status-msg { margin-top: 20px; font-size: 14px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="bo-yi-fang-container">
    <div class="header">
        <h3>🏛️ 博毅坊：智慧冰箱歸檔</h3>
        <p>當前方案：<span style="color: #f39c12; font-weight: bold;">Blaze (已激活)</span></p>
    </div>

    <div class="field-group">
        <label>📅 文件建置日期：</label>
        <input type="date" id="doc-build-date">
    </div>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
    <button onclick="document.getElementById('cameraInput').click()" class="btn-main">
        📸 拍取照片入庫
    </button>
    
    <div id="status-msg"></div>
</div>

<script>
// 1. 初始化日期：預設為今日
document.getElementById('doc-build-date').valueAsDate = new Date();

// 2. Firebase 配置 (已校準專案 ID: xuehong-inventory)
const firebaseConfig = {
    apiKey: "AIzaSyB...", // ⚠️ 這裡請填入你的真正的 API Key
    authDomain: "xuehong-inventory.firebaseapp.com",
    projectId: "xuehong-inventory",
    storageBucket: "xuehong-inventory.appspot.com",
    messagingSenderId: "...", 
    appId: "..."
};

// 3. 安全初始化預檢
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const storage = firebase.storage();

// 4. 上傳邏輯處理
document.getElementById('cameraInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    const buildDate = document.getElementById('doc-build-date').value;
    const status = document.getElementById('status-msg');

    if (!file) return;

    status.innerHTML = "<span style='color: #3498db;'>⏳ 正在歸檔至博毅坊雲端...</span>";

    try {
        // 檔案命名規則：建置日期/時間戳_原檔名
        const fileName = `inventory/${buildDate}/${Date.now()}_${file.name}`;
        const storageRef = storage.ref(fileName);
        
        const snapshot = await storageRef.put(file);
        const downloadURL = await snapshot.ref.getDownloadURL();
        
        status.innerHTML = `
            <div style="background: #e8f5e9; padding: 15px; border-radius: 10px; border: 1px solid #27ae60;">
                <b style="color: #27ae60;">✅ 歸檔成功！</b><br>
                <small>建置日期：${buildDate}</small><br>
                <a href="${downloadURL}" target="_blank" style="color: #2980b9;">[查看雲端檔案]</a>
            </div>`;
        
    } catch (error) {
        console.error("博毅坊執行異常：", error);
        status.innerHTML = `<b style="color: #c0392b;">❌ 失敗：</b> ${error.message}`;
    }
});
</script>

</body>
</html>
