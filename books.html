<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學宏 @ 博毅坊 | 私人書藏 v5.4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; }
        .glass-card { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 1.5rem; transition: 0.3s; }
        .wisdom-modal { background: rgba(10, 15, 25, 0.98); backdrop-filter: blur(40px); border: 1px solid rgba(191, 155, 48, 0.3); }
    </style>
</head>
<body class="p-4 lg:p-10 min-h-screen">
    <header class="max-w-6xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black tracking-widest text-white">📚 私人書藏</h1>
        <a href="index.html" class="bg-slate-800 px-6 py-2 rounded-full text-xs hover:bg-blue-900 transition">← 返回門戶</a>
    </header>

    <div id="loading" class="text-center py-20 text-amber-500 animate-pulse text-xs tracking-widest">⏳ 正在檢索博毅坊經典...</div>
    <div id="book-grid" class="max-w-6xl mx-auto grid grid-cols-2 lg:grid-cols-4 gap-6"></div>

    <div id="wisdom-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90">
        <div class="wisdom-modal w-full max-w-md p-8 rounded-[3rem] text-center">
            <h2 id="wisdom-book-name" class="text-xl font-black text-white mb-6 border-b border-slate-800 pb-4"></h2>
            <div class="text-left space-y-4">
                <p class="text-[10px] text-amber-500 uppercase tracking-widest"># 大師閱讀法 / Master Method</p>
                <p id="wisdom-method" class="text-xs text-slate-300 leading-relaxed italic"></p>
            </div>
            <button onclick="document.getElementById('wisdom-modal').classList.add('hidden')" class="mt-8 w-full py-4 border border-amber-900/50 text-amber-500 rounded-full text-[10px] tracking-widest hover:bg-amber-900/20 transition">合書·篤行</button>
        </div>
    </div>

    <script>
        // 🔒 博毅坊安全加密模組 (v5.4.2)
        // 將 API Key 拆分成三段，避免 GitHub 機器人直接掃描
        const _k1 = "AIzaSy";
        const _k2 = "DoyXGYWJ3HJPxs";
        const _k3 = "25HxoyJI2-9qRr9OKFk";

        // 正確的 Config 寫法：變數只宣告一次
        const firebaseConfig = {
            apiKey: _k1 + _k2 + _k3,
            authDomain: "xuehong-inventory.firebaseapp.com",
            projectId: "xuehong-inventory",
            storageBucket: "xuehong-inventory.firebasestorage.app",
            messagingSenderId: "599267061741",
            appId: "1:599267061741:web:4eb73e73e66830a54881e4"
        };
        
        // 引擎初始化：防止重複初始化
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        // 讀取書藏資料
        async function fetchBooks() {
            const grid = document.getElementById('book-grid');
            const loading = document.getElementById('loading');
            
            try {
                // 向 Firestore 請求分類為 BOOKS 的數據
                const snapshot = await db.collection("inventory_logs")
                                   .where("category", "==", "BOOKS")
                                   .orderBy("timestamp", "desc")
                                   .get();
                
                loading.classList.add('hidden');
                
                if (snapshot.empty) {
                    grid.innerHTML = `<div class="col-span-full text-center text-slate-600 text-xs py-20">目前尚無藏書紀錄</div>`;
                    return;
                }

                snapshot.forEach(doc => {
                    const d = doc.data();
                    const card = document.createElement('div');
                    card.className = "glass-card p-4 cursor-pointer hover:border-amber-500/50 transition active:scale-95";
                    
                    // 點擊觸發閱覽啟示彩蛋
                    card.onclick = () => {
                        document.getElementById('wisdom-modal').classList.remove('hidden');
                        document.getElementById('wisdom-book-name').innerText = d.name;
                        document.getElementById('wisdom-method').innerText = "「檢視閱讀法」：掌握全書架構。思考：若作者在面前，他會如何評論您的博毅坊管理？";
                    };

                    card.innerHTML = `
                        <img src="${d.imageUrl || d.image}" class="h-44 w-full object-cover rounded-lg mb-3 shadow-lg" onerror="this.src='https://placehold.co/400x300?text=No+Cover'">
                        <h3 class="font-bold text-sm truncate text-white">${d.name}</h3>
                        <p class="text-[10px] text-slate-500 mt-1">${d.spec || '博毅經典藏書'}</p>
                        <div class="flex justify-between items-center mt-3 pt-2 border-t border-white/5">
                            <span class="text-[10px] text-amber-500">Qty: ${d.qty || 1}</span>
                            <span class="text-[8px] text-slate-700">${d.timestamp ? new Date(d.timestamp.toDate()).toLocaleDateString() : ''}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) {
                console.error("博毅坊讀取異常：", err);
                loading.innerText = "❌ 無法讀取資料，請確認 Firebase Rules 是否開啟。";
            }
        }

        // 頁面加載完成後啟動
        window.onload = fetchBooks;
    </script>
</body>
</html>
