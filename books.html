<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { background: #0b1120; color: #f1f5f9; font-family: 'Noto Serif TC', serif; margin: 0; overflow-x: hidden; }
        
        /* 閱覽啟示卡樣式 */
        .wisdom-modal {
            background: rgba(10, 15, 25, 0.98);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(191, 155, 48, 0.3); /* 金色邊框意象 */
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            animation: fadeIn 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .wisdom-accent { color: #d4af37; font-weight: 900; }
    </style>
</head>
<body class="flex lg:items-center lg:justify-center min-h-screen">
    <div id="wisdom-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90">
        <div class="wisdom-modal w-full max-w-md p-8 lg:p-12 rounded-[3rem] text-center relative">
            <div class="absolute top-8 left-1/2 -translate-x-1/2 w-12 h-[1px] bg-amber-600/50"></div>
            
            <p class="text-[10px] tracking-[0.4em] mb-6 text-amber-500 uppercase">Bo-Yi Reading Enlightenment</p>
            <h2 id="wisdom-book-name" class="text-2xl font-black text-white mb-8 border-b border-slate-800 pb-4">書籍名稱</h2>
            
            <div class="text-left space-y-6">
                <div>
                    <p class="text-[10px] wisdom-accent mb-2"># 大師閱讀法 / Master Method</p>
                    <p id="wisdom-method" class="text-xs lg:text-sm text-slate-300 leading-relaxed italic"></p>
                </div>
                <div class="pt-4 border-t border-slate-900">
                    <p class="text-[10px] wisdom-accent mb-2"># 轉化為力量 / Knowledge to Power</p>
                    <p id="wisdom-action" class="text-xs lg:text-sm text-slate-300 leading-relaxed"></p>
                </div>
            </div>

            <button onclick="closeWisdom()" class="mt-12 w-full py-4 border border-amber-900/50 text-amber-500 hover:bg-amber-950/30 rounded-full text-[10px] tracking-[0.5em] transition uppercase">
                合書·篤行
            </button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzx_NyCOnB_6ylCti5A_vLJWSJVs2ZsSCoQnwdix3CmQSUkF-wiPMzzuGAUL9bTdry9ow/exec";
        const currentCat = "BOOKS";

        // 博毅閱覽啟示庫 [cite: 2025-10-01]
        const readingWisdom = [
            {
                method: "「檢視閱讀法」：在短時間內掌握全書架構。先讀目錄、索引與摘要，決定此書是否值得精讀。",
                action: "將此書的核心論點寫成一張『概念圖』，若不能對人解釋清楚，代表尚未內化。"
            },
            {
                method: "「主動閱讀」：不要只是被動吸收。在空白處提問，與作者辯論，將書本變成對話錄。",
                action: "從書中找出一項可以立刻實行的『微習慣』，在接下來的 24 小時內執行它。"
            },
            {
                method: "「格柵模型法」：不要只從單一學科看問題。試著將此書知識與你的其他收藏（如科技或歷史）產生連結。",
                action: "思考：如果這本書的作者站在你面前，他會如何評論你目前的博毅坊管理？"
            },
            {
                method: "「慢讀與深思」：遇到觸動心靈的段落，停下來，閉上眼，讓文字在腦中形成畫面。",
                action: "摘錄一段最令你心驚的句子，將其設定為你今日的『博毅思考主題』。"
            }
        ];

        function showReadingWisdom(name) {
            const modal = document.getElementById('wisdom-modal');
            const bookTitle = document.getElementById('wisdom-book-name');
            const methodText = document.getElementById('wisdom-method');
            const actionText = document.getElementById('wisdom-action');

            const randomWisdom = readingWisdom[Math.floor(Math.random() * readingWisdom.length)];

            bookTitle.innerText = name;
            methodText.innerText = randomWisdom.method;
            actionText.innerText = randomWisdom.action;

            modal.classList.remove('hidden');
        }

        function closeWisdom() {
            document.getElementById('wisdom-modal').classList.add('hidden');
        }

        // 修改 createCard 增加點擊功能
        function createCard(name, spec, url, qty, date) {
            const div = document.createElement('div');
            div.className = "glass-card p-4 rounded-xl flex flex-col cursor-pointer transition active:scale-95 hover:border-amber-900/50";
            div.onclick = () => showReadingWisdom(name); // 綁定點擊啟示

            div.innerHTML = `
                <img src="${url}" class="w-full h-32 lg:h-40 object-cover rounded-lg mb-3 shadow-lg" onerror="this.src='https://placehold.co/400x300?text=No+Cover'">
                <h3 class="font-bold text-sm mb-1 truncate text-white">${name}</h3>
                <p class="text-[10px] text-slate-500 truncate">${spec || '博毅藏書'}</p>
                <div class="flex justify-between mt-auto items-center pt-3 border-t border-white/5">
                    <span class="text-amber-500 font-mono text-base">x${qty}</span>
                    <span class="text-[8px] text-slate-700">${date ? date.split(' ')[0] : ''}</span>
                </div>
            `;
            return div;
        }

        // ... 其餘載入邏輯維持不變 ...
    </script>
</body>
</html>
